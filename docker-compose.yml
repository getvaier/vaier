# The wireguard container's bridge address, pinned so the host-netns route-sync container can name it
# without Docker DNS. Sits high in the subnet, clear of the addresses Docker hands out sequentially from
# .2, so it can never collide with a dynamically-assigned container. Everything else — Vaier's
# LanRouteAdapter, traefik-lan-routes — still resolves the container by DNS name and is unaffected.
x-wireguard-bridge-ip: &wireguard-bridge-ip "172.20.0.250"

networks:
  vaier-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

configs:
  # Inline haproxy template for the docker-socket-proxy container. Embedded so
  # the stack works from a single docker-compose.yml download. The tecnativa
  # entrypoint runs envsubst over this template, so $${LOG_LEVEL}, $$SOCKET_PATH
  # and $${BIND_CONFIG} are escaped here ($$ = literal $ after Compose interpolation)
  # and resolved at container start. Regex anchors (start$$, push$$) are likewise
  # escaped. Everything inside { env(NAME) -m bool } is haproxy syntax, not shell.
  haproxy_template:
    content: |
      global
          log stdout format raw daemon "$${LOG_LEVEL}"

          pidfile /run/haproxy.pid
          maxconn 4000

          # Turn on stats unix socket
          server-state-file /var/lib/haproxy/server-state

      defaults
          mode http
          log global
          option httplog
          option dontlognull
          option http-server-close
          option redispatch
          retries 3
          timeout http-request 10s
          timeout queue 1m
          timeout connect 10s
          timeout client 10m
          timeout server 10m
          timeout http-keep-alive 10s
          timeout check 10s
          maxconn 3000

          # Allow seamless reloads
          load-server-state-from-file global

          # Use provided example error pages
          errorfile 400 /usr/local/etc/haproxy/errors/400.http
          errorfile 403 /usr/local/etc/haproxy/errors/403.http
          errorfile 408 /usr/local/etc/haproxy/errors/408.http
          errorfile 500 /usr/local/etc/haproxy/errors/500.http
          errorfile 502 /usr/local/etc/haproxy/errors/502.http
          errorfile 503 /usr/local/etc/haproxy/errors/503.http
          errorfile 504 /usr/local/etc/haproxy/errors/504.http

      backend dockerbackend
          server dockersocket $$SOCKET_PATH

      backend docker-events
          server dockersocket $$SOCKET_PATH
          timeout server 0

      frontend dockerfrontend
          bind $${BIND_CONFIG}
          http-request deny unless METH_GET || { env(POST) -m bool }

          # Vaier-specific explicit denies (placed BEFORE the broad CONTAINERS allow).
          # These close the privesc chain that the upstream CONTAINERS=1 + POST=1
          # combination otherwise leaves open: an attacker with RCE in vaier could
          # otherwise POST /containers/create + POST /containers/{id}/start to launch
          # a --privileged container and escape to host root. Also block image pulls
          # and other write paths that POST=1 alone would otherwise permit.
          http-request deny if METH_POST { path -m end /containers/create }
          http-request deny if METH_POST { path -m reg -i /containers/[a-zA-Z0-9_.-]+/start$$ }
          http-request deny if METH_POST { path -m end /images/create }
          http-request deny if METH_POST { path -m end /images/load }
          http-request deny if METH_POST { path -m reg -i /images/[^/]+/push$$ }

          # Allowed endpoints (env-driven, unchanged from tecnativa default)
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/((stop)|(restart)|(kill)) } { env(ALLOW_RESTARTS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/start } { env(ALLOW_START) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/stop } { env(ALLOW_STOP) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/auth } { env(AUTH) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/build } { env(BUILD) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/commit } { env(COMMIT) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/configs } { env(CONFIGS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers } { env(CONTAINERS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/distribution } { env(DISTRIBUTION) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/events } { env(EVENTS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/exec } { env(EXEC) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/grpc } { env(GRPC) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/images } { env(IMAGES) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/info } { env(INFO) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/networks } { env(NETWORKS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/nodes } { env(NODES) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/_ping } { env(PING) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/plugins } { env(PLUGINS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/secrets } { env(SECRETS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/services } { env(SERVICES) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/session } { env(SESSION) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/swarm } { env(SWARM) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/system } { env(SYSTEM) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/tasks } { env(TASKS) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/version } { env(VERSION) -m bool }
          http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/volumes } { env(VOLUMES) -m bool }
          http-request deny
          default_backend dockerbackend

          use_backend docker-events if { path,url_dec -m reg -i ^(/v[\d\.]+)?/events }

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
    container_name: wireguard
    # Memory caps on every service so one runaway container cannot exhaust this
    # 1.9 GB host and livelock it (2026-07-10). Sized from measured RSS with
    # generous headroom; caps are ceilings, not reservations.
    mem_limit: 128m
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
      - SERVERURL=vaier.${VAIER_DOMAIN}
      - SERVERPORT=51820
      - PEERS=0
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      vaier-network:
        ipv4_address: *wireguard-bridge-ip

  wireguard-masquerade:
    image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
    container_name: wireguard-masquerade
    mem_limit: 64m
    network_mode: "service:wireguard"
    cap_add:
      - NET_ADMIN
    entrypoint:
      - /bin/bash
      - -c
      - |
        until ip link show wg0 2>/dev/null; do sleep 2; done
        while ip link show wg0 2>/dev/null; do
          # Docker network -> VPN: source-NAT bridge traffic as it leaves wg0.
          iptables -t nat -C POSTROUTING -s 172.20.0.0/16 -o wg0 -j MASQUERADE 2>/dev/null || \
            iptables -t nat -A POSTROUTING -s 172.20.0.0/16 -o wg0 -j MASQUERADE
          # VPN -> anywhere off-tunnel: source-NAT anything leaving a non-wg0 interface
          # so a LAN host behind a server peer can reach the server's VPC/LAN and get a
          # return route. Matching `! -o wg0` is NIC-name agnostic, so it works whether the
          # egress is the bridge (eth0) or the host NIC (ens5) -- unlike the wg0.conf
          # PostUp's `-o eth+`, which is a no-op when the NIC isn't named eth*. #248.
          iptables -t nat -C POSTROUTING ! -o wg0 -j MASQUERADE 2>/dev/null || \
            iptables -t nat -A POSTROUTING ! -o wg0 -j MASQUERADE
          sleep 10
        done
        exit 1
    depends_on:
      - wireguard
    restart: unless-stopped

  traefik:
    image: traefik:v3.6.14
    container_name: traefik
    mem_limit: 192m
    cap_add:
      - NET_ADMIN
    entrypoint:
      - /bin/sh
      - -c
      - |
        WG_IP=$$(getent hosts wireguard | awk '{print $$1}')
        ip route add 10.13.13.0/24 via "$$WG_IP" 2>/dev/null || true
        # LAN routes via relay peers — scan VAIER metadata in peer configs.
        for f in /wireguard-config/*/*.conf; do
          [ -f "$$f" ] || continue
          cidr=$$(grep -oE '"lanCidr":"[^"]+"' "$$f" 2>/dev/null | head -1 | sed -E 's/.*"lanCidr":"([^"]+)".*/\1/')
          [ -n "$$cidr" ] && ip route replace "$$cidr" via "$$WG_IP" 2>/dev/null || true
        done
        exec traefik "$$0" "$$@"
    command:
      - --log.level=INFO
      - --log.format=json
      - --accesslog=true
      - --accesslog.format=json
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://docker-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/traefik/config
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}
      - --certificatesresolvers.letsencrypt.acme.storage=/traefik/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/config:/traefik/config
      - ./traefik/acme:/traefik/acme
      - ./wireguard/config:/wireguard-config:ro
    restart: unless-stopped
    depends_on:
      - wireguard
      - docker-proxy
    networks:
      - vaier-network

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-proxy
    mem_limit: 64m
    environment:
      # Allowlist flags for Vaier + Traefik. Combined with the haproxy_template
      # config below (which adds explicit denies for /containers/create and
      # /containers/{id}/start), this closes the privesc chain from "RCE in
      # vaier" to "host root via docker run --privileged".
      - CONTAINERS=1     # /containers and /containers/{id}/json — Vaier discovery + Traefik provider
      - EVENTS=1         # /events — DockerEventListener + Traefik live updates
      - EXEC=1           # /exec — WireGuardVpnAdapter exec into wireguard container
      - IMAGES=1         # /images — DockerServerAdapter image inspect
      - PING=1           # /_ping — health checks
      - POST=1           # global gate for POST methods (required by EXEC and ALLOW_RESTARTS)
      - ALLOW_RESTARTS=1 # /containers/{name}/restart — DockerContainerAdapter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Override the upstream template so the entrypoint substitutes env vars
    # into our custom config (added explicit denies). CMD reads /tmp/haproxy.cfg.
    configs:
      - source: haproxy_template
        target: /usr/local/etc/haproxy/haproxy.cfg.template
        mode: 0444
    restart: unless-stopped
    networks:
      - vaier-network

  # The Vaier host is the one machine in the fleet that IS the Docker host rather than something behind
  # the tunnel, so it inherits no LAN routes: `traefik-lan-routes` and Vaier's own LanRouteAdapter write
  # into container netns, never the host's. That left the host unable to reach a relay's LAN — so a backup
  # job for the Vaier server itself couldn't reach the borg server, and neither could any host-level tool.
  #
  # This shares the HOST's network namespace and installs the same relay lanCidr routes there, via the
  # wireguard container. It can't use Docker DNS to find that container (the host has none), so it reads
  # the address the sibling containers see. wireguard-masquerade already SNATs 172.20.0.0/16 out of wg0,
  # and a host packet routed at the bridge is sourced from 172.20.0.1 — inside that range — so replies
  # come back without any extra rule.
  host-lan-routes:
    image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
    container_name: host-lan-routes
    mem_limit: 64m
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      # The host has no Docker DNS, so it can't resolve `wireguard` the way the sibling route-sync
      # containers do. Hence the pinned bridge address below — never the Docker socket, which would hand
      # a NET_ADMIN host-netns container full control of the daemon that docker-socket-proxy exists to fence off.
      WG_IP: *wireguard-bridge-ip
    volumes:
      - ./wireguard/config:/wireguard-config:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        while true; do
          if [ -n "$$WG_IP" ]; then
            for f in /wireguard-config/*/*.conf; do
              [ -f "$$f" ] || continue
              cidr=$$(grep -oE '"lanCidr":"[^"]+"' "$$f" 2>/dev/null | head -1 | sed -E 's/.*"lanCidr":"([^"]+)".*/\1/')
              if [ -n "$$cidr" ]; then
                ip route show "$$cidr" 2>/dev/null | grep -q "via $$WG_IP" || \
                  ip route replace "$$cidr" via "$$WG_IP" 2>/dev/null || true
              fi
            done
          fi
          sleep 15
        done
    depends_on:
      - wireguard
    restart: unless-stopped

  traefik-lan-routes:
    image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
    container_name: traefik-lan-routes
    mem_limit: 64m
    network_mode: "service:traefik"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./wireguard/config:/wireguard-config:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        # Keep Traefik's route table in sync with relay peers' lanCidr metadata.
        # Re-scans every 15s so newly-set lanCidrs are picked up without a Traefik restart.
        while true; do
          WG_IP=$$(getent hosts wireguard | awk '{print $$1}')
          if [ -n "$$WG_IP" ]; then
            for f in /wireguard-config/*/*.conf; do
              [ -f "$$f" ] || continue
              cidr=$$(grep -oE '"lanCidr":"[^"]+"' "$$f" 2>/dev/null | head -1 | sed -E 's/.*"lanCidr":"([^"]+)".*/\1/')
              if [ -n "$$cidr" ]; then
                ip route show "$$cidr" 2>/dev/null | grep -q "via $$WG_IP" || \
                  ip route replace "$$cidr" via "$$WG_IP" 2>/dev/null || true
              fi
            done
          fi
          sleep 15
        done
    depends_on:
      - traefik
      - wireguard
    restart: unless-stopped

  geoip-init:
    image: alpine:3.20
    container_name: geoip-init
    command:
      - sh
      - -c
      - |
        set -e
        DEST=/geoip/dbip-city-lite.mmdb
        MARKER=/geoip/.month
        MONTH=$$(date +%Y-%m)
        if [ -f "$$DEST" ] && [ "$$(cat $$MARKER 2>/dev/null)" = "$$MONTH" ]; then
          echo "DB-IP MMDB already current for $$MONTH"
          exit 0
        fi
        apk add --no-cache wget >/dev/null
        URL=https://download.db-ip.com/free/dbip-city-lite-$$MONTH.mmdb.gz
        echo "Downloading $$URL"
        if ! wget -q -O /tmp/db.mmdb.gz "$$URL"; then
          PREV=$$(date -d "$$MONTH-01 -1 day" +%Y-%m 2>/dev/null || date +%Y-%m)
          echo "Current month not published, falling back to $$PREV"
          wget -q -O /tmp/db.mmdb.gz "https://download.db-ip.com/free/dbip-city-lite-$$PREV.mmdb.gz" || {
            echo "WARN: could not download geolocation DB; peer map will be empty"
            exit 0
          }
        fi
        gunzip -c /tmp/db.mmdb.gz > "$$DEST"
        echo "$$MONTH" > "$$MARKER"
        rm -f /tmp/db.mmdb.gz
        echo "Geolocation DB ready at $$DEST"
    volumes:
      - ./geoip:/geoip
    restart: "no"

  vaier-init:
    image: busybox:1.37.0
    container_name: vaier-init
    command:
      - sh
      - -c
      - |
        set -e
        # Vaier container runs as UID 1000 (Dockerfile USER directive). Bind mounts inherit
        # host ownership, so we chown the config dirs once on every start.
        for d in /vaier/config /traefik/config /wireguard/config /icons; do
          [ -d "$$d" ] && chown -R 1000:1000 "$$d"
        done
    volumes:
      - ./vaier/config:/vaier/config
      - ./traefik/config:/traefik/config
      - ./wireguard/config:/wireguard/config
      - ./icons:/icons
    restart: "no"

  vaier:
    image: getvaier/vaier:latest
    container_name: vaier
    # The JVM sizes its heap from the cgroup limit once one exists, so this cap and
    # JAVA_TOOL_OPTIONS below must be read together: 55% of 768m is a ~422 MB heap,
    # leaving ~346 MB for metaspace, code cache, thread stacks and direct buffers.
    # Measured steady-state RSS is ~340 MB. Without the explicit percentage the JVM
    # would fall back to its 25% default and starve itself down to a 192 MB heap.
    mem_limit: 768m
    cap_add:
      # Needed by VpnNetworkSetupAdapter and LanRouteAdapter, which shell out to
      # `ip route` inside this container to install routes for the VPN subnet
      # and relay-peer LAN CIDRs. WireGuard exec is unrelated and runs in the
      # wireguard container's own namespace (which has its own NET_ADMIN).
      - NET_ADMIN
    environment:
      # Heap ceiling as a share of the mem_limit above. Read the mem_limit comment before changing.
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=55
      # The zone Vaier reads local time in. The nightly fleet-backup schedule compares the configured
      # hour against this zone, so "02:00" means 02:00 here — not 02:00 UTC. Defaults to UTC; set
      # VAIER_TZ in .env (e.g. Europe/Oslo) to schedule in your own local time.
      TZ: ${VAIER_TZ:-UTC}
      VAIER_AWS_KEY: ${VAIER_AWS_KEY:-}
      VAIER_AWS_SECRET: ${VAIER_AWS_SECRET:-}
      VAIER_DOMAIN: ${VAIER_DOMAIN:-}
      VAIER_PUBLIC_HOST: ${VAIER_PUBLIC_HOST:-}
      VAIER_PUBLIC_IP: ${VAIER_PUBLIC_IP:-}
      # Override the auto-detected LAN/VPC subnet (EC2 IMDS detects only the server's own /20).
      # Set to the whole VPC CIDR (e.g. 172.31.0.0/16) to register machines in any subnet/AZ.
      # Also threaded into server peers' client-side AllowedIPs so they can initiate connections
      # back into the server's LAN through the tunnel (#204).
      VAIER_SERVER_LAN_CIDR: ${VAIER_SERVER_LAN_CIDR:-}
      VAIER_LICENSE: ${VAIER_LICENSE:-}
      # Presence of the Google client id enables the per-service "Social" auth mode (#305).
      VAIER_OIDC_GOOGLE_CLIENT_ID: ${VAIER_OIDC_GOOGLE_CLIENT_ID:-}
      # Seeds/keeps this identity as an admin AccessEntry so the console is never locked out
      # (self-heal in AccessFileAdapter, read via System.getenv). Must reach the container (#305).
      VAIER_ADMIN_EMAIL: ${VAIER_ADMIN_EMAIL:-}
      WIREGUARD_CONFIG_PATH: /wireguard/config
      WIREGUARD_CONTAINER_NAME: wireguard
      TRAEFIK_CONFIG_PATH: /traefik/config
      TRAEFIK_API_URL: http://traefik:8080
      VAIER_CONFIG_PATH: /vaier/config
      DOCKER_HOST: tcp://docker-proxy:2375
    depends_on:
      vaier-init:
        condition: service_completed_successfully
      docker-proxy:
        condition: service_started
      wireguard:
        condition: service_started
      traefik:
        condition: service_started
      geoip-init:
        condition: service_completed_successfully
    volumes:
      - ./traefik/config:/traefik/config
      - ./wireguard/config:/wireguard/config
      - ./vaier/config:/vaier/config
      - ./geoip:/geoip:ro
      # Resolved service icons — read-write so a resolved icon is fetched online once then served
      # from disk across restarts (icon.cache.path).
      - ./icons:/icons
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # Tier 1 — PUBLIC router (no auth): serves the viewer-adaptive launchpad SHELL and its assets
      # plus the public data feed, so a logged-out visitor gets the dashboard instead of the Google
      # sign-in. Precisely whitelisted: the launchpad page + its static assets (styles.css, icons),
      # the anonymous services feed, and the LAN docker-setup script. Never admin.html or any admin
      # API — those fall through to the Tier 3 catch-all below.
      - traefik.http.routers.vaier-public.rule=Host(`vaier.${VAIER_DOMAIN}`) && (Path(`/`) || Path(`/index.html`) || Path(`/launchpad.html`) || Path(`/styles.css`) || Path(`/avatar.js`) || PathPrefix(`/icon`) || Path(`/favicon`) || Path(`/launchpad/services`) || Path(`/launchpad/events`) || Path(`/lan-servers/docker-setup.sh`))
      - traefik.http.routers.vaier-public.entrypoints=websecure
      - traefik.http.routers.vaier-public.tls.certresolver=letsencrypt
      - traefik.http.routers.vaier-public.priority=200
      # Tier 2 — IDENTITY-OPTIONAL router: the viewer-adaptive endpoints. oauth2-authn only — it
      # injects the identity headers (X-Auth-Request-*) when a session exists, and returns 401 for an
      # anonymous caller (the page treats that as anonymous and falls back to /launchpad/services).
      # NO oauth2-signin (so no forced-login redirect) and NO vaier-authz (so no admin gate): a
      # signed-in non-admin can read its own identity and its own reachable tiles.
      - traefik.http.routers.vaier-identity.rule=Host(`vaier.${VAIER_DOMAIN}`) && (Path(`/launchpad/services-authenticated`) || Path(`/users/me`) || Path(`/published-services/events`))
      - traefik.http.routers.vaier-identity.entrypoints=websecure
      - traefik.http.routers.vaier-identity.tls.certresolver=letsencrypt
      - traefik.http.routers.vaier-identity.middlewares=oauth2-authn@file,vaier-down
      - traefik.http.routers.vaier-identity.priority=250
      # Tier 3 — ADMIN catch-all: everything else (admin.html, all admin APIs). Gated by the full
      # Social chain, and vaier-authz enforces admin for the console — non-admins get 403.
      - traefik.http.routers.vaier.rule=Host(`vaier.${VAIER_DOMAIN}`)
      - traefik.http.routers.vaier.entrypoints=websecure
      - traefik.http.routers.vaier.tls.certresolver=letsencrypt
      # #305: the console is gated by the Social chain (Google). The oauth2-* middlewares live in
      # the file provider (kept alive by social-gated services + the startup backfill).
      - traefik.http.routers.vaier.middlewares=oauth2-signin@file,oauth2-authn@file,vaier-authz@file,vaier-down
      - traefik.http.routers.vaier.priority=100
      # /oauth2/* on the console host must reach oauth2-proxy (sign-in / callback / sign_out),
      # above the console router so the Google flow isn't swallowed by the auth chain.
      - traefik.http.routers.vaier-oauth2.rule=Host(`vaier.${VAIER_DOMAIN}`) && PathPrefix(`/oauth2/`)
      - traefik.http.routers.vaier-oauth2.entrypoints=websecure
      - traefik.http.routers.vaier-oauth2.tls.certresolver=letsencrypt
      - traefik.http.routers.vaier-oauth2.priority=300
      - traefik.http.routers.vaier-oauth2.service=oauth2-proxy
      - traefik.http.services.vaier.loadbalancer.server.port=8080
      # When the Vaier backend itself is unreachable (502/503/504), the vaier-down errors middleware
      # (defined on vaier-offline) serves the branded offline page instead of Traefik's bare "Bad
      # gateway". vaier-public also carries it so unauthenticated public paths degrade gracefully.
      - traefik.http.routers.vaier-public.middlewares=vaier-down
    networks:
      - vaier-network

  # --- #305 social login: oauth2-proxy is the forward-auth gatekeeper; Vaier owns authorization
  # via /authz/verify. This is mandatory infrastructure — the sole auth gateway — so it always
  # starts with `docker compose up -d` (no `social` profile). oauth2-proxy no longer talks to Google
  # directly: it federates through the Dex identity broker (see the dex service below), which fans
  # out to the Google and GitHub connectors. Identity stays keyed on email, so /authz/verify,
  # access.yml and the Traefik chain are unchanged.
  #
  #   Traefik -> oauth2-proxy -> Dex -> Google / GitHub
  #
  # Set the upstream OAuth credentials in .env: VAIER_OIDC_GOOGLE_CLIENT_ID / *_SECRET and
  # VAIER_OIDC_GITHUB_CLIENT_ID / *_SECRET. VAIER_DEX_CLIENT_SECRET (the oauth2-proxy<->Dex shared
  # secret) and VAIER_OAUTH2_COOKIE_SECRET are auto-generated into .env (not operator-authored).
  #
  # oauth2-proxy-init renders oauth2-proxy's alpha config into the shared ./oauth2/config volume so
  # the repo ships a generic, secret-free compose: (1) the oauth2-proxy<->Dex shared secret is
  # written to a mode-0600 client-secret file (referenced via clientSecretFile, never inlined), and
  # (2) alpha.yaml is rendered with only VAIER_DOMAIN substituted into the Dex issuer URL. Both files
  # are chowned to oauth2-proxy's uid:gid (65532:65532 — the image's nonroot USER) so the non-root
  # proxy can read them. Re-rendered on every start so a rotated secret/domain is picked up.
  oauth2-proxy-init:
    image: alpine:3.20
    container_name: oauth2-proxy-init
    environment:
      - VAIER_DOMAIN=${VAIER_DOMAIN:-}
      - VAIER_DEX_CLIENT_SECRET=${VAIER_DEX_CLIENT_SECRET:-}
    command:
      - sh
      - -c
      - |
        set -e
        umask 077
        printf '%s' "$$VAIER_DEX_CLIENT_SECRET" > /oauth2/config/client-secret
        # Unquoted heredoc: the shell substitutes only $${VAIER_DOMAIN}; the alpha body contains no
        # other $$ so nothing else is interpolated.
        cat > /oauth2/config/alpha.yaml <<EOF
        injectRequestHeaders:
        - {name: X-Forwarded-Groups, values: [{claimSource: {claim: groups}}]}
        - {name: X-Forwarded-User, values: [{claimSource: {claim: user}}]}
        - {name: X-Forwarded-Email, values: [{claimSource: {claim: email}}]}
        - {name: X-Forwarded-Preferred-Username, values: [{claimSource: {claim: preferred_username}}]}
        - {name: X-Forwarded-Name, values: [{claimSource: {claim: name}}]}
        injectResponseHeaders:
        - {name: X-Auth-Request-User, values: [{claimSource: {claim: user}}]}
        - {name: X-Auth-Request-Email, values: [{claimSource: {claim: email}}]}
        - {name: X-Auth-Request-Preferred-Username, values: [{claimSource: {claim: preferred_username}}]}
        - {name: X-Auth-Request-Groups, values: [{claimSource: {claim: groups}}]}
        - {name: X-Auth-Request-Name, values: [{claimSource: {claim: name}}]}
        - {name: X-Auth-Request-Connector, values: [{claimSource: {claim: federated_claims.connector_id}}]}
        - {name: X-Auth-Request-Connector-Uid, values: [{claimSource: {claim: federated_claims.user_id}}]}
        providers:
        - id: dex
          provider: oidc
          clientID: vaier-oauth2
          clientSecretFile: /oauth2/config/client-secret
          # federated:id makes Dex emit federated_claims (connector_id/user_id) so we can record which
          # identity provider each user last signed in with; the rest are oauth2-proxy's defaults.
          scope: openid email profile federated:id
          oidcConfig:
            issuerURL: https://dex.$${VAIER_DOMAIN}
            audienceClaims: [aud]
            emailClaim: email
            groupsClaim: groups
            userIDClaim: email
            insecureSkipNonce: true
          # oauth2-proxy only exposes a claim to header injection if it is first extracted into the
          # session here. Extraction is dot-path aware and stores each value under the FULL dotted
          # key, and the injectResponseHeaders lookup is a flat match on that same key — so the
          # strings here must be byte-identical to the claimSource.claim values above. Without the
          # two federated_claims leaves, X-Auth-Request-Connector[-Uid] ship empty.
          additionalClaims: [name, federated_claims.connector_id, federated_claims.user_id]
          # connector_id is user-supplied by the sign-in buttons; oauth2-proxy only forwards a
          # user value when it matches an allow rule, so Dex jumps straight to the chosen provider
          # instead of showing its own chooser. No approval_prompt=force: forcing re-consent on every
          # login is what made users re-grant access each time — Dex's skipApprovalScreen handles it.
          loginURLParameters:
          - {name: connector_id, allow: [{value: google}, {value: github}]}
        server:
          BindAddress: 0.0.0.0:4180
        upstreamConfig:
          upstreams: [{id: static://202, path: /, static: true, staticCode: 202}]
        EOF
        chown 65532:65532 /oauth2/config/client-secret /oauth2/config/alpha.yaml
    volumes:
      - ./oauth2/config:/oauth2/config
    restart: "no"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    container_name: oauth2-proxy
    mem_limit: 96m
    command:
      # Flags kept as flags — not covered by alpha config, or conflicting with it.
      - --cookie-secret=${VAIER_OAUTH2_COOKIE_SECRET}
      - --cookie-domain=.${VAIER_DOMAIN}
      - --cookie-secure=true
      # Lax SameSite: defence-in-depth against cross-site use of the auth cookie (e.g. a WebSocket
      # upgrade from another origin). Safe for the top-level Google/Dex sign-in redirect flow.
      - --cookie-samesite=lax
      - --whitelist-domain=.${VAIER_DOMAIN}
      - --email-domain=*
      - --reverse-proxy=true
      - --redirect-url=https://oauth2.${VAIER_DOMAIN}/oauth2/callback
      # Brand the sign-in page in Vaier's dark theme (overrides only sign_in.html).
      - --custom-templates-dir=/templates
      # Provider (generic OIDC brokered by Dex), client id/secret, upstream, header injection (incl.
      # the name claim) and the bind address now come from the rendered alpha config — see oauth2-proxy-init.
      - --alpha-config=/oauth2/config/alpha.yaml
    volumes:
      - ./oauth2/templates:/templates:ro
      - ./oauth2/config:/oauth2/config:ro
    depends_on:
      oauth2-proxy-init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.oauth2-proxy.rule=Host(`oauth2.${VAIER_DOMAIN}`)
      - traefik.http.routers.oauth2-proxy.entrypoints=websecure
      - traefik.http.routers.oauth2-proxy.tls.certresolver=letsencrypt
      - traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180
    networks:
      - vaier-network

  # --- #305 follow-up: Dex OIDC broker. Sits behind oauth2-proxy and federates Google + GitHub, so
  # a user signs in with either provider while oauth2-proxy stays the single forward-auth gatekeeper
  # and identity stays keyed on email. Mandatory infrastructure — no `social` profile.
  #
  # dex-init mirrors oauth2-proxy-init: it renders config.yaml from the operator credentials and
  # chowns it to Dex's nonroot uid:gid (1001:1001) so Dex can read it. Re-rendered on every start so
  # rotated credentials/domain are picked up. Unlike oauth2-proxy (which references its client secret
  # via clientSecretFile), Dex has NO file-based secret option for connectors or for staticClients —
  # so all three secrets are rendered directly into config.yaml, which is written mode-0600 (umask
  # 077) and owned by Dex. It lives in the gitignored ./dex/config runtime volume and is never
  # committed. This is the standard Dex pattern given its config schema.
  dex-init:
    image: alpine:3.20
    container_name: dex-init
    environment:
      - VAIER_DOMAIN=${VAIER_DOMAIN:-}
      - VAIER_OIDC_GOOGLE_CLIENT_ID=${VAIER_OIDC_GOOGLE_CLIENT_ID:-}
      - VAIER_OIDC_GOOGLE_CLIENT_SECRET=${VAIER_OIDC_GOOGLE_CLIENT_SECRET:-}
      - VAIER_OIDC_GITHUB_CLIENT_ID=${VAIER_OIDC_GITHUB_CLIENT_ID:-}
      - VAIER_OIDC_GITHUB_CLIENT_SECRET=${VAIER_OIDC_GITHUB_CLIENT_SECRET:-}
      - VAIER_DEX_CLIENT_SECRET=${VAIER_DEX_CLIENT_SECRET:-}
    command:
      - sh
      - -c
      - |
        set -e
        umask 077
        # Unquoted heredoc: the shell substitutes $${VAIER_DOMAIN}, the two client ids, and the three
        # secrets; the config body contains no other $$ so nothing else is interpolated.
        cat > /dex/config/config.yaml <<EOF
        issuer: https://dex.$${VAIER_DOMAIN}
        storage: {type: memory}
        web: {http: 0.0.0.0:5556}
        oauth2: {skipApprovalScreen: true}
        frontend: {dir: /srv/dex/web, theme: vaier, issuer: Vaier}
        staticClients:
        - id: vaier-oauth2
          name: Vaier
          secret: $${VAIER_DEX_CLIENT_SECRET}
          redirectURIs: [https://oauth2.$${VAIER_DOMAIN}/oauth2/callback]
        connectors:
        - type: google
          id: google
          name: Google
          config: {clientID: $${VAIER_OIDC_GOOGLE_CLIENT_ID}, clientSecret: $${VAIER_OIDC_GOOGLE_CLIENT_SECRET}, redirectURI: https://dex.$${VAIER_DOMAIN}/callback}
        - type: github
          id: github
          name: GitHub
          config: {clientID: $${VAIER_OIDC_GITHUB_CLIENT_ID}, clientSecret: $${VAIER_OIDC_GITHUB_CLIENT_SECRET}, redirectURI: https://dex.$${VAIER_DOMAIN}/callback}
        EOF
        chown 1001:1001 /dex/config/config.yaml
    volumes:
      - ./dex/config:/dex/config
    restart: "no"

  dex:
    image: ghcr.io/dexidp/dex:v2.45.1
    container_name: dex
    mem_limit: 96m
    command: [dex, serve, /dex/config/config.yaml]
    volumes:
      - ./dex/config:/dex/config:ro
      # Brand Dex's own screens (error, connector picker) in Vaier's dark theme. Only the theme dir is
      # overlaid onto the image's built-in web assets; frontend.dir in config.yaml points Dex at the
      # on-disk copy so it picks up this theme (see dex-init).
      - ./dex/themes/vaier:/srv/dex/web/themes/vaier:ro
    depends_on:
      dex-init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.dex.rule=Host(`dex.${VAIER_DOMAIN}`)
      - traefik.http.routers.dex.entrypoints=websecure
      - traefik.http.routers.dex.tls.certresolver=letsencrypt
      - traefik.http.services.dex.loadbalancer.server.port=5556
    networks:
      - vaier-network

  # Tiny static page server that stands in for Vaier when Vaier is down. Deliberately independent of
  # the vaier container so the branded offline page is still reachable while Vaier is unavailable.
  vaier-offline:
    image: nginx:1.27.5-alpine
    container_name: vaier-offline
    mem_limit: 32m
    restart: unless-stopped
    volumes:
      - ./offline/html:/usr/share/nginx/html:ro
      - ./offline/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.services.vaier-offline.loadbalancer.server.port=80
      # Fallback router for the Vaier host. Its priority sits ABOVE the self-published file-provider
      # router (priority 30 in remote-apps.yml, which still points at the dead backend when Vaier is
      # down) but BELOW Vaier's own docker-label routers (priority 100/200). So while Vaier is up its
      # real routers win; when the vaier container stops, those drop away and this one becomes the
      # highest match — serving the branded offline page for any path instead of "Bad gateway".
      - traefik.http.routers.vaier-offline.rule=Host(`vaier.${VAIER_DOMAIN}`)
      - traefik.http.routers.vaier-offline.priority=50
      - traefik.http.routers.vaier-offline.entrypoints=websecure
      - traefik.http.routers.vaier-offline.tls.certresolver=letsencrypt
      - traefik.http.routers.vaier-offline.service=vaier-offline
      # Also catch app-level gateway errors while the vaier container is still running (e.g. a
      # mid-restart 502/503/504): the errors middleware swaps in the same static page.
      - traefik.http.middlewares.vaier-down.errors.status=502-504
      - traefik.http.middlewares.vaier-down.errors.service=vaier-offline
      - traefik.http.middlewares.vaier-down.errors.query=/
    networks:
      - vaier-network
