services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
      - SERVERURL=wireweave.eilertsen.family
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/traefik/config
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/traefik/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config:/traefik/config
      - ./traefik/acme:/traefik/acme
    restart: unless-stopped

  wireweave:
    image: geireilertsen/wireweave:latest
    container_name: wireweave
    cap_add:
      - NET_ADMIN
    environment:
      WIREWEAVE_AWS_KEY: ${WIREWEAVE_AWS_KEY}
      WIREWEAVE_AWS_SECRET: ${WIREWEAVE_AWS_SECRET}
      WIREGUARD_CONFIG_PATH: /wireguard/config
      WIREGUARD_CONTAINER_NAME: wireguard
      TRAEFIK_CONFIG_PATH: /traefik/config
      TRAEFIK_API_URL: http://traefik:8080
    depends_on:
      - wireguard
      - traefik
    volumes:
      - ./traefik/config:/traefik/config
      - ./wireguard/config:/wireguard/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    ports:
      - 8888:8080
    labels:
      - traefik.enable=true
      # HTTP router with redirect to HTTPS
      - traefik.http.routers.wireweave-http.rule=Host(`wireweave.eilertsen.family`)
      - traefik.http.routers.wireweave-http.entrypoints=web
      - traefik.http.routers.wireweave-http.middlewares=wireweave-redirect
      - traefik.http.middlewares.wireweave-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.wireweave-redirect.redirectscheme.permanent=true
      # HTTPS router
      - traefik.http.routers.wireweave.rule=Host(`wireweave.eilertsen.family`)
      - traefik.http.routers.wireweave.entrypoints=websecure
      - traefik.http.routers.wireweave.tls.certresolver=letsencrypt
      - traefik.http.services.wireweave.loadbalancer.server.port=8080
