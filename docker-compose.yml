services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
      - SERVERURL=wireweave.eilertsen.family
      - SERVERPORT=51820
      - PEERS=0
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/traefik/config
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/traefik/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config:/traefik/config
      - ./traefik/acme:/traefik/acme
    restart: unless-stopped
    depends_on:
      - authelia

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./authelia/redis:/data

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    environment:
      - TZ=Europe/Oslo
    volumes:
      - ./authelia/config:/config
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # HTTPS router for Authelia
      - traefik.http.routers.authelia.rule=Host(`auth.${WIREWEAVE_DOMAIN}`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls.certresolver=letsencrypt
      - traefik.http.services.authelia.loadbalancer.server.port=9091

  wireweave:
    image: geireilertsen/wireweave:latest
    container_name: wireweave
    cap_add:
      - NET_ADMIN
    environment:
      WIREWEAVE_AWS_KEY: ${WIREWEAVE_AWS_KEY}
      WIREWEAVE_AWS_SECRET: ${WIREWEAVE_AWS_SECRET}
      WIREWEAVE_DOMAIN: ${WIREWEAVE_DOMAIN}
      WIREGUARD_CONFIG_PATH: /wireguard/config
      WIREGUARD_CONTAINER_NAME: wireguard
      TRAEFIK_CONFIG_PATH: /traefik/config
      TRAEFIK_API_URL: http://traefik:8080
      AUTHELIA_CONFIG_PATH: /authelia/config
    depends_on:
      - wireguard
      - traefik
      - authelia
    volumes:
      - ./traefik/config:/traefik/config
      - ./wireguard/config:/wireguard/config:ro
      - ./authelia/config:/authelia/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.wireweave.rule=Host(`${WIREWEAVE_DOMAIN}`)
      - traefik.http.routers.wireweave.entrypoints=websecure
      - traefik.http.routers.wireweave.tls.certresolver=letsencrypt
      - traefik.http.routers.wireweave.middlewares=wireweave-auth
      # Authelia middleware
      - traefik.http.middlewares.wireweave-auth.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.${WIREWEAVE_DOMAIN}
      - traefik.http.middlewares.wireweave-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.wireweave-auth.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
      - traefik.http.services.wireweave.loadbalancer.server.port=8080
