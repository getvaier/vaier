networks:
  vaier-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
      - SERVERURL=vaier.${VAIER_DOMAIN}
      - SERVERPORT=51820
      - PEERS=0
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      - vaier-network

  wireguard-masquerade:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard-masquerade
    network_mode: "service:wireguard"
    cap_add:
      - NET_ADMIN
    entrypoint:
      - /bin/bash
      - -c
      - |
        until ip link show wg0 2>/dev/null; do sleep 2; done
        while ip link show wg0 2>/dev/null; do
          iptables -t nat -C POSTROUTING -s 172.20.0.0/16 -o wg0 -j MASQUERADE 2>/dev/null || \
            iptables -t nat -A POSTROUTING -s 172.20.0.0/16 -o wg0 -j MASQUERADE
          sleep 10
        done
        exit 1
    depends_on:
      - wireguard
    restart: unless-stopped

  traefik:
    image: traefik:latest
    container_name: traefik
    cap_add:
      - NET_ADMIN
    entrypoint:
      - /bin/sh
      - -c
      - |
        WG_IP=$$(getent hosts wireguard | awk '{print $$1}')
        ip route add 10.13.13.0/24 via "$$WG_IP" 2>/dev/null || true
        exec traefik "$$0" "$$@"
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/traefik/config
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/traefik/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config:/traefik/config
      - ./traefik/acme:/traefik/acme
    restart: unless-stopped
    depends_on:
      - wireguard
      - authelia
    networks:
      - vaier-network

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./authelia/redis:/data
    networks:
      - vaier-network

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    environment:
      - TZ=Europe/Oslo
    volumes:
      - ./authelia/config:/config
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # HTTPS router for Authelia
      - traefik.http.routers.authelia.rule=Host(`auth.${VAIER_DOMAIN}`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls.certresolver=letsencrypt
      - traefik.http.services.authelia.loadbalancer.server.port=9091
    networks:
      - vaier-network

  vaier:
    image: getvaier/vaier:latest
    container_name: vaier
    cap_add:
      - NET_ADMIN
    environment:
      VAIER_AWS_KEY: ${VAIER_AWS_KEY}
      VAIER_AWS_SECRET: ${VAIER_AWS_SECRET}
      VAIER_DOMAIN: ${VAIER_DOMAIN}
      WIREGUARD_CONFIG_PATH: /wireguard/config
      WIREGUARD_CONTAINER_NAME: wireguard
      TRAEFIK_CONFIG_PATH: /traefik/config
      TRAEFIK_API_URL: http://traefik:8080
      AUTHELIA_CONFIG_PATH: /authelia/config
    depends_on:
      - wireguard
      - traefik
      - authelia
    volumes:
      - ./traefik/config:/traefik/config
      - ./wireguard/config:/wireguard/config
      - ./authelia/config:/authelia/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.vaier.rule=Host(`vaier.${VAIER_DOMAIN}`)
      - traefik.http.routers.vaier.entrypoints=websecure
      - traefik.http.routers.vaier.tls.certresolver=letsencrypt
      - traefik.http.routers.vaier.middlewares=vaier-auth
      # Authelia middleware
      - traefik.http.middlewares.vaier-auth.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.${VAIER_DOMAIN}
      - traefik.http.middlewares.vaier-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.vaier-auth.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
      - traefik.http.services.vaier.loadbalancer.server.port=8080
    networks:
      - vaier-network
