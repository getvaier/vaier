name: Static Analysis (on-demand)

# SpotBugs (+ find-sec-bugs + fb-contrib) is intentionally NOT part of the
# every-push / PR build. The RELEASE hard gate lives in build-deploy.yml (a
# tag-only step that blocks publishing if it fails). This workflow is the
# on-demand companion: run it from the Actions tab to check static analysis
# before tagging a release. The baseline noise filter lives in
# spotbugs-exclude.xml; it fails on any new finding.
on:
  workflow_dispatch:

jobs:
  spotbugs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: SpotBugs (find-sec-bugs + fb-contrib)
      run: mvn -B clean compile com.github.spotbugs:spotbugs-maven-plugin:check
