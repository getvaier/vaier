name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run tests
      run: mvn test

    - name: Build Docker image
      run: |
        docker build -t vaier:${{ github.sha }} .
        docker tag vaier:${{ github.sha }} vaier:latest

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image (main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:latest
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:${{ github.sha }}

    - name: Push Docker image (release tag)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:${VERSION}
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:${VERSION}

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: target/vaier-*.jar
