name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run tests
      run: mvn test

    - name: Build Docker image
      run: |
        VAIER_VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
        docker build --build-arg VAIER_VERSION="${VAIER_VERSION}" -t vaier:${{ github.sha }} .
        docker tag vaier:${{ github.sha }} vaier:latest

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image (main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:latest
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:${{ github.sha }}

    - name: Push Docker image (release tag)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        docker tag vaier:latest ${{ secrets.DOCKER_USERNAME }}/vaier:${VERSION}
        docker push ${{ secrets.DOCKER_USERNAME }}/vaier:${VERSION}

    - name: Prepare release compose file
      id: prepare_release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        mkdir -p release
        sed "s|getvaier/vaier:latest|getvaier/vaier:${VERSION}|" \
          docker-compose.yml > release/docker-compose.yml

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: release/docker-compose.yml
        body: |
          ## Deploying

          Download `docker-compose.yml` from the assets below (pinned to
          `getvaier/vaier:${{ steps.prepare_release.outputs.version }}`),
          set the required env vars, then:

          ```bash
          docker compose up -d
          ```

          The `Source code (zip/tar.gz)` archives are generated
          automatically by GitHub and are **not** needed to deploy.
