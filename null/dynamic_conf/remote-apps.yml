http:
  routers:
    string-router:
      rule: Host(`string`)
      entryPoints:
      - websecure
      service: string-service
      tls:
        certResolver: letsencrypt
      middlewares:
      - auth-middleware
  services:
    string-service:
      loadBalancer:
        servers:
        - url: http://string:0
  middlewares:
    auth-middleware:
      forwardAuth:
        address: http://authelia:9091/api/verify?rd=https://auth.eilertsen.family/
        trustForwardHeader: true
        authResponseHeaders:
        - X-Forwarded-User
        - X-Forwarded-Groups
        - X-Forwarded-Email
