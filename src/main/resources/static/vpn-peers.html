<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Peers</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .peer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .peer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            cursor: pointer;
            user-select: none;
        }

        .peer-header:hover { background: var(--bg-hover); }

        .peer-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .peer-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        .peer-ip-badge {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 0.1rem 0.4rem;
            border-radius: 2px;
            border: 1px solid var(--border);
        }

        .peer-status-text {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .peer-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .peer-chevron {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-left: 0.25rem;
            transition: transform 0.15s;
            display: inline-block;
        }

        .peer-chevron.open { transform: rotate(180deg); }

        .peer-body {
            display: none;
            padding: 0 1rem 1rem;
            border-top: 1px solid var(--border);
        }

        .peer-body.open { display: block; }

        .peer-details {
            display: grid;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .detail-row {
            display: flex;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .detail-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            min-width: 130px;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding-top: 0.05rem;
        }

        .detail-value {
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.78rem;
            word-break: break-all;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-connected    { background: var(--green); box-shadow: 0 0 4px var(--green); }
        .status-disconnected { background: var(--red); }

        /* Config preview */
        .config-preview {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            max-height: 280px;
            overflow-y: auto;
        }

        .config-preview pre {
            margin: 0;
            font-family: var(--mono);
            font-size: 0.78rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
        }

        .config-preview strong {
            display: block;
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .empty-state p {
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .form-checkbox input { width: auto; accent-color: var(--accent); }

        /* Service list */
        .service-list {
            display: grid;
            grid-template-columns: 1fr auto auto;
            column-gap: 0.75rem;
            row-gap: 0.2rem;
            align-items: center;
            width: 100%;
            font-family: var(--mono);
            font-size: 0.75rem;
        }

        .service-list-header { display: contents; }
        .service-list-header > span {
            color: var(--text-dim);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid var(--border);
        }

        .service-row { display: contents; color: var(--text); }

        .service-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }

        .service-port {
            color: var(--text-muted);
            text-align: right;
            white-space: nowrap;
        }

        .service-tag {
            color: var(--text-muted);
            text-align: right;
            white-space: nowrap;
        }

        /* QR modal */
        .qr-canvas-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0 0.5rem;
        }

        .qr-canvas-container img {
            background: #ffffff;
            padding: 12px;
            border-radius: 2px;
            display: block;
        }

        .qr-hint {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .qr-loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-style: italic;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .peer-header { flex-wrap: wrap; gap: 0.4rem; padding: 0.6rem 0.75rem; }
            .peer-header-left { flex: 1 1 100%; flex-wrap: wrap; }
            .peer-actions { flex: 1 1 100%; flex-wrap: wrap; }
            .peer-body { padding: 0 0.75rem 0.75rem; }
            .detail-row { flex-direction: column; gap: 0.15rem; }
            .detail-label { min-width: unset; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title">
            <!-- Shield icon -->
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 1.5L2 4v4c0 3.2 2.6 5.9 6 6.5 3.4-.6 6-3.3 6-6.5V4L8 1.5z"/>
                <polyline points="5.5 8 7.2 9.7 10.5 6"/>
            </svg>
            VPN Peers
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" onclick="showCreatePeerModal()">+ Add Peer</button>
        </div>
    </div>

    <div class="container">
        <div id="error-message"></div>
        <div id="success-message"></div>
        <div id="peers-container">
            <div class="loading">Loading peers…</div>
        </div>
    </div>

    <!-- Create Peer Modal -->
    <div id="createPeerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add New Peer</div>
            <div class="form-group">
                <label class="form-label" for="peerName">Peer Name</label>
                <input type="text" id="peerName" class="form-input" placeholder="e.g. laptop, phone">
            </div>
            <div class="form-group">
                <label class="form-label" for="peerType">Peer Type</label>
                <select id="peerType" class="form-input" onchange="onPeerTypeChange()">
                    <option value="UBUNTU_SERVER">Ubuntu server with Docker</option>
                    <option value="WINDOWS_SERVER">Windows server with Docker</option>
                    <option value="MOBILE_CLIENT">Mobile client (phone/tablet)</option>
                    <option value="WINDOWS_CLIENT">Windows client (laptop/desktop)</option>
                </select>
            </div>
            <div class="form-group" id="lanCidrGroup" style="display:none">
                <label class="form-label" for="lanCidr">LAN CIDR (optional)</label>
                <input type="text" id="lanCidr" class="form-input" placeholder="e.g. 192.168.1.0/24">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="createPeerCancelBtn" onclick="hideCreatePeerModal()">Cancel</button>
                <button class="btn btn-primary"   id="createPeerSubmitBtn" onclick="createPeer()">Create Peer</button>
            </div>
        </div>
    </div>

    <!-- Peer Details Modal -->
    <div id="peerDetailsModal" class="modal">
        <div class="modal-content" style="max-width:680px;width:95%">
            <div class="modal-header">Peer Configuration</div>
            <div id="peerDetailsContent"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hidePeerDetailsModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteConfirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Delete Peer</div>
            <p style="font-size:0.85rem;color:var(--text-muted)">
                Remove peer <code style="color:var(--text);background:var(--bg-input);padding:0.1rem 0.3rem;border-radius:2px" id="deletePeerName"></code>?
            </p>
            <p style="font-size:0.78rem;color:var(--red);margin-top:0.5rem;">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideDeleteConfirmModal()">Cancel</button>
                <button class="btn btn-danger"    onclick="deletePeer()">Delete</button>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content" style="max-width:380px;width:95%">
            <div class="modal-header" id="qrModalTitle">QR Code</div>
            <div id="qrModalBody">
                <div class="qr-loading">Loading config…</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideQrModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let peers = [];
        let peerServices = {};
        let lastFetchSuccessful = false;

        const expandedPeers     = new Set();

        function parseImageTag(image) {
            if (!image) return '';
            const slashIdx = image.lastIndexOf('/');
            const nameAndTag = slashIdx >= 0 ? image.slice(slashIdx + 1) : image;
            const colonIdx = nameAndTag.indexOf(':');
            if (colonIdx < 0) return 'latest';
            const tag = nameAndTag.slice(colonIdx + 1);
            return tag.length > 20 ? tag.slice(0, 12) + '…' : tag;
        }

        function cardId(peerName) {
            return peerName.replace(/[^a-zA-Z0-9]/g, '_');
        }

        async function fetchPeers() {
            try {
                const response = await fetch('/vpn/peers');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                peers = await response.json();
                displayPeers(peers);
                lastFetchSuccessful = true;
                document.getElementById('error-message').innerHTML = '';
            } catch (error) {
                console.error('Failed to load peers:', error);
                if (!lastFetchSuccessful && peers.length === 0)
                    displayError(`Failed to load peers: ${error.message}`);
            }

            try {
                const response = await fetch('/docker-services/peers');
                if (response.ok) {
                    const services = await response.json();
                    peerServices = Object.fromEntries(services.map(s => [s.peerName, s]));
                    displayPeers(peers);
                }
            } catch (error) {
                console.error('Failed to load peer services:', error);
            }
        }

        function displayError(message) {
            document.getElementById('error-message').innerHTML = `<div class="error">${message}</div>`;
        }

        function displaySuccess(message) {
            const el = document.getElementById('success-message');
            el.innerHTML = `<div class="success">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        function formatBytes(bytes) {
            const b = parseInt(bytes);
            if (isNaN(b) || b === 0) return '0 B';
            const k = 1024, sizes = ['B','KB','MB','GB','TB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return Math.round((b / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function togglePeer(peerName) {
            const id = cardId(peerName);
            const body    = document.getElementById('body-' + id);
            const chevron = document.getElementById('chevron-' + id);
            if (!body) return;

            if (expandedPeers.has(peerName)) {
                expandedPeers.delete(peerName);
                body.classList.remove('open');
                chevron.classList.remove('open');
            } else {
                expandedPeers.add(peerName);
                body.classList.add('open');
                chevron.classList.add('open');
            }
        }

        function displayPeers(peers) {
            const container = document.getElementById('peers-container');

            if (peers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">◎</div>
                        <h2>No VPN Peers</h2>
                        <p>Add your first peer to get started</p>
                    </div>`;
                return;
            }

            const html = peers.map(peer => {
                const handshakeTime = parseInt(peer.latestHandshake);
                const currentTime   = Math.floor(Date.now() / 1000);
                const isConnected   = handshakeTime > 0 && (currentTime - handshakeTime) < 180;
                const statusClass   = isConnected ? 'status-connected' : 'status-disconnected';
                const statusText    = isConnected ? 'connected' : 'disconnected';
                const vpnIp  = peer.allowedIps.split('/')[0];
                const id     = cardId(peer.name);
                const isExpanded = expandedPeers.has(peer.name);

                const peerType = peer.peerType || 'UBUNTU_SERVER';
                const isServerType = peerType === 'UBUNTU_SERVER' || peerType === 'WINDOWS_SERVER';

                const services = peerServices[peer.name];
                const servicesHtml = (() => {
                    if (!isServerType) return '';
                    if (!isConnected)
                        return `<div class="detail-row"><span class="detail-label">Services</span><span class="detail-value" style="color:var(--text-dim)">not connected</span></div>`;
                    if (!services || services.status === 'UNREACHABLE')
                        return `<div class="detail-row"><span class="detail-label">Services</span><span class="detail-value" style="color:var(--text-dim)">unreachable</span></div>`;
                    if (!services.containers || services.containers.length === 0)
                        return `<div class="detail-row"><span class="detail-label">Services</span><span class="detail-value" style="color:var(--text-dim)">none discovered</span></div>`;
                    const rows = services.containers.map(c => {
                        const port    = c.ports[0]?.publicPort;
                        const version = c.version || parseImageTag(c.image);
                        return `<div class="service-row">
                            <span class="service-name">${c.containerName}</span>
                            <span class="service-port">${port != null ? ':' + port : '—'}</span>
                            <span class="service-tag">${version}</span>
                        </div>`;
                    }).join('');
                    return `<div class="detail-row">
                        <span class="detail-label">Services</span>
                        <div class="service-list">
                            <div class="service-list-header">
                                <span>name</span><span>port</span><span>version</span>
                            </div>
                            ${rows}
                        </div>
                    </div>`;
                })();

                return `
                <div class="peer-card">
                    <div class="peer-header" onclick="togglePeer('${peer.name.replace(/'/g, "\\'")}')">
                        <div class="peer-header-left">
                            <span class="status-dot ${statusClass}" id="hdr-dot-${id}"></span>
                            <span class="peer-name">${peer.name}</span>
                            <span class="peer-ip-badge">${vpnIp}</span>
                            <span class="peer-status-text" id="hdr-status-${id}">${statusText}</span>
                        </div>
                        <div class="peer-actions">
                            <button class="btn btn-small btn-secondary" onclick="event.stopPropagation();viewPeerConfig('${peer.name}')">config</button>
                            ${(peerType === 'UBUNTU_SERVER' || peerType === 'WINDOWS_SERVER') ? `<button class="btn btn-small btn-secondary" onclick="event.stopPropagation();downloadDockerCompose('${peer.name}')">compose</button>` : ''}
                            ${peerType === 'UBUNTU_SERVER' ? `<button class="btn btn-small btn-secondary" onclick="event.stopPropagation();downloadSetupScript('${peer.name}')">script</button>` : ''}
                            ${peerType === 'MOBILE_CLIENT' ? `<button class="btn btn-small btn-secondary" onclick="event.stopPropagation();showQrModal('${peer.name}')">qr</button>` : ''}
                            <button class="btn btn-small btn-danger"    onclick="event.stopPropagation();confirmDeletePeer('${peer.name}')">
                                <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
                            </button>
                            <span class="peer-chevron ${isExpanded ? 'open' : ''}" id="chevron-${id}">▼</span>
                        </div>
                    </div>
                    <div class="peer-body ${isExpanded ? 'open' : ''}" id="body-${id}">
                        <div class="peer-details">
                            <div class="detail-row">
                                <span class="detail-label">Status</span>
                                <div class="connection-status">
                                    <span class="status-dot ${statusClass}" id="dot-${id}"></span>
                                    <span style="font-family:var(--mono);font-size:0.78rem" id="status-${id}">${statusText}</span>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">IP Address</span>
                                <span class="detail-value">${vpnIp}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Public Key</span>
                                <span class="detail-value">${peer.publicKey}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Allowed IPs</span>
                                <span class="detail-value">${peer.allowedIps}</span>
                            </div>
                            ${peer.endpointIp ? `
                            <div class="detail-row">
                                <span class="detail-label">Endpoint</span>
                                <span class="detail-value">${peer.endpointIp}:${peer.endpointPort}</span>
                            </div>` : ''}
                            <div class="detail-row">
                                <span class="detail-label">Rx / Tx</span>
                                <span class="detail-value" id="rxtx-${id}">${formatBytes(peer.transferRx)} / ${formatBytes(peer.transferTx)}</span>
                            </div>
                            ${servicesHtml}
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;

        }

        function showCreatePeerModal() {
            document.getElementById('createPeerModal').classList.add('active');
            document.getElementById('peerName').value = '';
            document.getElementById('peerType').value = 'UBUNTU_SERVER';
            document.getElementById('lanCidr').value = '';
            document.getElementById('lanCidrGroup').style.display = 'none';
        }

        function onPeerTypeChange() {
            const type = document.getElementById('peerType').value;
            const isServer = type === 'UBUNTU_SERVER' || type === 'WINDOWS_SERVER';
            document.getElementById('lanCidrGroup').style.display = type === 'UBUNTU_SERVER' ? '' : 'none';
        }

        function hideCreatePeerModal() {
            document.getElementById('createPeerModal').classList.remove('active');
        }

        async function createPeer() {
            const name          = document.getElementById('peerName').value.trim();
            const peerType      = document.getElementById('peerType').value;
            const lanCidr       = document.getElementById('lanCidr').value.trim() || null;
            if (!name) { displayError('Please enter a peer name'); return; }

            const submitBtn = document.getElementById('createPeerSubmitBtn');
            const cancelBtn = document.getElementById('createPeerCancelBtn');
            submitBtn.disabled = true;
            cancelBtn.disabled = true;
            submitBtn.textContent = 'Creating…';

            try {
                const response = await fetch('/vpn/peers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, peerType, lanCidr })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const createdPeer = await response.json();
                hideCreatePeerModal();
                displaySuccess(`Peer "${createdPeer.name}" created`);
                showPeerDetails(createdPeer);
                fetchPeers();
            } catch (error) {
                displayError(`Failed to create peer: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                cancelBtn.disabled = false;
                submitBtn.textContent = 'Create Peer';
            }
        }

        function peerDownloadButtons(peerName, peerType) {
            const t = peerType || 'UBUNTU_SERVER';
            const btns = [];
            if (t === 'MOBILE_CLIENT' || t === 'WINDOWS_CLIENT') {
                btns.push(`<button class="btn btn-primary" onclick="downloadConf('${peerName}')">↓ .conf file</button>`);
            }
            if (t === 'MOBILE_CLIENT') {
                btns.push(`<button class="btn btn-primary" onclick="showQrModal('${peerName}')">QR code</button>`);
            }
            if (t === 'UBUNTU_SERVER' || t === 'WINDOWS_SERVER') {
                btns.push(`<button class="btn btn-primary" onclick="downloadDockerComposeForPeer('${peerName}')">↓ Docker Compose</button>`);
            }
            if (t === 'UBUNTU_SERVER') {
                btns.push(`<button class="btn btn-primary" onclick="downloadSetupScript('${peerName}')">↓ Setup Script</button>`);
            }
            return btns.join('');
        }

        function downloadConf(peerName) {
            window.location.href = `/vpn/peers/${encodeURIComponent(peerName)}/config-file`;
        }

        function showPeerDetails(peer) {
            document.getElementById('peerDetailsContent').innerHTML = `
                <div class="peer-details">
                    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${peer.name}</span></div>
                    <div class="detail-row"><span class="detail-label">IP Address</span><span class="detail-value">${peer.ipAddress}</span></div>
                    <div class="detail-row"><span class="detail-label">Public Key</span><span class="detail-value">${peer.publicKey}</span></div>
                </div>
                <div class="config-preview">
                    <strong>Client Configuration</strong>
                    <pre>${peer.configFile}</pre>
                </div>
                <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
                    ${peerDownloadButtons(peer.name, peer.peerType)}
                </div>`;
            document.getElementById('peerDetailsModal').classList.add('active');
        }

        function hidePeerDetailsModal() {
            document.getElementById('peerDetailsModal').classList.remove('active');
        }

        function downloadDockerComposeForPeer(peerName) {
            window.location.href = `/vpn/peers/${encodeURIComponent(peerName)}/docker-compose`;
        }

        async function viewPeerConfig(peerName) {
            try {
                const response = await fetch(`/vpn/peers/${encodeURIComponent(peerName)}/config`);
                if (!response.ok) { displayError('Peer configuration not found'); return; }
                showPeerConfigModal(await response.json());
            } catch (error) {
                displayError(`Failed to load peer configuration: ${error.message}`);
            }
        }

        function showPeerConfigModal(peerConfig) {
            document.getElementById('peerDetailsContent').innerHTML = `
                <div class="peer-details">
                    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${peerConfig.name}</span></div>
                    <div class="detail-row"><span class="detail-label">IP Address</span><span class="detail-value">${peerConfig.ipAddress}</span></div>
                </div>
                <div class="config-preview">
                    <strong>Client Configuration</strong>
                    <pre>${peerConfig.configFile}</pre>
                </div>
                <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
                    ${peerDownloadButtons(peerConfig.name, peerConfig.peerType)}
                </div>`;
            document.getElementById('peerDetailsModal').classList.add('active');
        }

        function downloadDockerCompose(peerName) { downloadDockerComposeForPeer(peerName); }

        function downloadSetupScript(peerName) {
            window.location.href = `/vpn/peers/${encodeURIComponent(peerName)}/setup-script`;
        }


        let peerToDelete = null;

        function confirmDeletePeer(peerName) {
            peerToDelete = peerName;
            document.getElementById('deletePeerName').textContent = peerName;
            document.getElementById('deleteConfirmModal').classList.add('active');
        }

        function hideDeleteConfirmModal() {
            document.getElementById('deleteConfirmModal').classList.remove('active');
            peerToDelete = null;
        }

        async function deletePeer() {
            if (!peerToDelete) return;
            const peerName = peerToDelete;
            try {
                const response = await fetch(`/vpn/peers/${encodeURIComponent(peerToDelete)}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                hideDeleteConfirmModal();
                displaySuccess(`Peer "${peerName}" deleted`);
                fetchPeers();
            } catch (error) {
                displayError(`Failed to delete peer: ${error.message}`);
            }
        }

        async function showQrModal(peerName) {
            const modal = document.getElementById('qrModal');
            const title = document.getElementById('qrModalTitle');
            const body  = document.getElementById('qrModalBody');

            title.textContent = 'QR Code — ' + peerName;
            body.innerHTML = '<div class="qr-loading">Generating QR code\u2026</div>';
            modal.classList.add('active');

            const url = '/vpn/peers/' + encodeURIComponent(peerName) + '/qr-code';
            body.innerHTML =
                '<div class="qr-canvas-container">' +
                  '<img src="' + url + '" width="256" height="256" alt="WireGuard QR code" onerror="qrImageError()">' +
                '</div>' +
                '<p class="qr-hint">Scan with WireGuard mobile app</p>';
        }

        function qrImageError() {
            document.getElementById('qrModalBody').innerHTML =
                '<div class="qr-loading" style="color:var(--red)">Failed to generate QR code</div>';
        }

        function hideQrModal() {
            document.getElementById('qrModal').classList.remove('active');
            document.getElementById('qrModalBody').innerHTML = '';
        }

        window.onclick = e => {
            if (e.target.classList.contains('modal')) {
                if (e.target.id === 'qrModal') hideQrModal();
                else e.target.classList.remove('active');
            }
        };

        fetchPeers();

        const _sse = new EventSource('/vpn/peers/events');
        _sse.addEventListener('peers-updated', () => fetchPeers());
        _sse.addEventListener('peers-stats', e => {
            try {
                const stats = JSON.parse(e.data);
                const now = Math.floor(Date.now() / 1000);
                stats.forEach(s => {
                    const id = s.name.replace(/[^a-zA-Z0-9]/g, '_');
                    const handshake = parseInt(s.latestHandshake);
                    const connected = handshake > 0 && (now - handshake) < 180;
                    const statusClass = connected ? 'status-connected' : 'status-disconnected';
                    const statusText  = connected ? 'connected' : 'disconnected';

                    const hdrDot    = document.getElementById('hdr-dot-'    + id);
                    const hdrStatus = document.getElementById('hdr-status-' + id);
                    const dot       = document.getElementById('dot-'        + id);
                    const status    = document.getElementById('status-'     + id);
                    const rxtx      = document.getElementById('rxtx-'       + id);

                    if (hdrDot)    { hdrDot.className    = 'status-dot ' + statusClass; }
                    if (hdrStatus) { hdrStatus.textContent = statusText; }
                    if (dot)       { dot.className        = 'status-dot ' + statusClass; }
                    if (status)    { status.textContent   = statusText; }
                    if (rxtx)      { rxtx.textContent     = formatBytes(s.transferRx) + ' / ' + formatBytes(s.transferTx); }
                });
            } catch (err) {
                console.error('Failed to apply peers-stats update:', err);
            }
        });
        let _sseConnected = false;
        _sse.onopen = () => { if (_sseConnected) fetchPeers(); _sseConnected = true; };
    </script>
</body>
</html>
