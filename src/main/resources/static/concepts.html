<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Concepts</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { min-height: 100%; }

        .content {
            padding: 2rem 1.5rem;
            max-width: 860px;
            margin: 0 auto;
        }

        .intro {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .group {
            margin-bottom: 2.25rem;
        }

        .group-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            font-weight: 600;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .concept {
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            margin-bottom: 0.6rem;
            scroll-margin-top: 1.5rem;
            transition: background 0.6s, border-color 0.6s;
        }

        .concept-term {
            font-weight: 700;
            color: var(--text);
        }

        .concept-def {
            color: var(--text-muted);
            margin-top: 0.3rem;
            line-height: 1.55;
        }

        .concept-why {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        .concept-why .why-label {
            color: var(--accent);
            font-weight: 600;
        }

        .concept.highlight {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .error {
            color: var(--red);
            padding: 1rem 0;
        }
    </style>
</head>
<body>
    <main class="content">
        <p class="intro">
            Plain-language definitions of the terms you meet across Vaier. Each entry says what it is
            and why it matters when you're managing your machines and services.
        </p>
        <div id="groups"></div>
    </main>

    <script>
        const groupsEl = document.getElementById('groups');

        function highlightFromHash() {
            const slug = location.hash.slice(1);
            if (!slug) return;
            const el = document.getElementById(slug);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 1600);
        }

        async function load() {
            try {
                const res = await fetch('/concepts', { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const groups = await res.json();
                render(groups);
                highlightFromHash();
            } catch (e) {
                groupsEl.innerHTML = '';
                const err = document.createElement('div');
                err.className = 'error';
                err.textContent = 'Could not load concepts.';
                groupsEl.appendChild(err);
            }
        }

        function render(groups) {
            groupsEl.replaceChildren();
            for (const group of groups) {
                const section = document.createElement('section');
                section.className = 'group';

                const title = document.createElement('h2');
                title.className = 'group-title';
                title.textContent = group.title;
                section.appendChild(title);

                for (const concept of group.concepts) {
                    const card = document.createElement('div');
                    card.className = 'concept';
                    card.id = concept.slug;

                    const term = document.createElement('div');
                    term.className = 'concept-term';
                    term.textContent = concept.term;
                    card.appendChild(term);

                    const def = document.createElement('div');
                    def.className = 'concept-def';
                    def.textContent = concept.definition;
                    card.appendChild(def);

                    const why = document.createElement('div');
                    why.className = 'concept-why';
                    const label = document.createElement('span');
                    label.className = 'why-label';
                    label.textContent = 'Why it matters: ';
                    why.appendChild(label);
                    why.appendChild(document.createTextNode(concept.whyYouCare));
                    card.appendChild(why);

                    section.appendChild(card);
                }
                groupsEl.appendChild(section);
            }
        }

        window.addEventListener('hashchange', highlightFromHash);
        load();
    </script>
</body>
</html>
