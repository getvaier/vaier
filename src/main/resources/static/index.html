<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaier Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #1a1f36;
            color: white;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            flex-shrink: 0;
        }

        .logo-section {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-menu {
            flex: 1;
            padding: 1rem 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .nav-item-text {
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-left-color: #667eea;
        }

        .main-content {
            flex: 1;
            overflow: auto;
            min-width: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #f5f5f5;
            padding: 2rem;
            text-align: center;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .welcome-screen h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .welcome-screen p {
            color: #7f8c8d;
            font-size: 1.125rem;
            max-width: 500px;
        }

        /* Mobile top bar */
        .mobile-topbar {
            display: none;
            background: #1a1f36;
            color: white;
            padding: 0 1rem;
            align-items: center;
            gap: 0.75rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            height: 52px;
            flex-shrink: 0;
        }

        .hamburger-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            line-height: 1;
            border-radius: 4px;
        }

        .hamburger-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mobile-topbar-logo {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .mobile-topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }

            .mobile-topbar {
                display: flex;
            }

            .app-container {
                padding-top: 52px;
                height: calc(100vh - 52px);
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                height: 100vh;
                z-index: 100;
                transition: left 0.3s ease;
                width: 250px;
            }

            .sidebar.open {
                left: 0;
            }

            .main-content {
                height: calc(100vh - 52px);
                width: 100%;
            }

            .welcome-screen h1 {
                font-size: 1.75rem;
            }

            .welcome-screen p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-topbar">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">☰</button>
        <div class="mobile-topbar-logo">🔗</div>
        <span class="mobile-topbar-title">Vaier</span>
    </div>
    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">🔗</div>
                    <div class="logo-text">Vaier</div>
                </div>
            </div>
            <div class="nav-menu">
                <a href="#services" class="nav-item" data-page="hosted-services.html">
                    <span class="nav-item-icon">🛠️</span>
                    <span class="nav-item-text">Services</span>
                </a>
                <a href="#vpn" class="nav-item" data-page="vpn-peers.html">
                    <span class="nav-item-icon">🔐</span>
                    <span class="nav-item-text">VPN Peers</span>
                </a>
                <a href="#users" class="nav-item" data-page="users.html">
                    <span class="nav-item-icon">👥</span>
                    <span class="nav-item-text">Users</span>
                </a>
            </div>
        </nav>
        <main class="main-content">
            <div class="welcome-screen">
                <div class="welcome-icon">🔗</div>
                <h1>Welcome to Vaier</h1>
                <p>Select an option from the menu to get started</p>
            </div>
        </main>
    </div>

    <script>
        const mainContent = document.querySelector('.main-content');
        const navItems = document.querySelectorAll('.nav-item');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const hamburgerBtn = document.getElementById('hamburgerBtn');

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        hamburgerBtn.addEventListener('click', () => {
            const isOpen = sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active', isOpen);
        });

        sidebarOverlay.addEventListener('click', closeSidebar);

        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();

                // Update active state
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');

                // Load page in iframe
                const page = item.getAttribute('data-page');
                mainContent.innerHTML = `<iframe src="${page}"></iframe>`;

                // Close sidebar on mobile after navigation
                closeSidebar();
            });
        });

        // Handle hash navigation on page load
        function loadPageFromHash() {
            const hash = window.location.hash.slice(1);
            const navItem = document.querySelector(`.nav-item[href="#${hash}"]`);
            if (navItem) {
                navItem.click();
            }
        }

        window.addEventListener('hashchange', loadPageFromHash);
        loadPageFromHash();
    </script>
</body>
</html>
