<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Vaier Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22none%22 stroke=%22%234fc3f7%22 stroke-width=%221.5%22 stroke-linecap=%22round%22><circle cx=%228%22 cy=%228%22 r=%222.2%22 fill=%22%234fc3f7%22 stroke=%22none%22/><line x1=%222.5%22 y1=%223.5%22 x2=%226%22 y2=%226.5%22/><line x1=%2213.5%22 y1=%223.5%22 x2=%2210%22 y2=%226.5%22/><line x1=%222.5%22 y1=%2212.5%22 x2=%226%22 y2=%229.5%22/><line x1=%2213.5%22 y1=%2212.5%22 x2=%2210%22 y2=%229.5%22/><circle cx=%222.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%222.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor/xterm/5.3.0/xterm.css">
    <style>
        html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
        body { display: flex; flex-direction: column; }
        .app-main {
            flex: 1;
            overflow: hidden;
            background: var(--bg);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .welcome {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }
        .welcome-logo { color: var(--accent); opacity: 0.4; }
        .welcome h1 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        .welcome p {
            font-size: 0.82rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/launchpad.html" class="topbar-brand" aria-label="Vaier">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="8" cy="8" r="2.2" fill="currentColor" stroke="none"/>
                <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
                <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
                <circle cx="2.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="2.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            <span>V<span class="brand-ai">ai</span>er</span>
        </a>
        <nav class="topbar-nav" id="adminTabs">
            <button class="topbar-item" data-page="vpn-peers.html" data-hash="infrastructure">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="2" width="14" height="10" rx="1"/>
                    <line x1="5" y1="15" x2="11" y2="15"/>
                    <line x1="8" y1="12" x2="8" y2="15"/>
                </svg>
                <span class="link-label">Infrastructure</span>
            </button>
            <button class="topbar-item" data-page="backups.html" data-hash="backups">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1.5" y="2.5" width="13" height="3" rx="0.5"/>
                    <path d="M2.5 5.5v7a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-7"/>
                    <line x1="6" y1="8.5" x2="10" y2="8.5"/>
                </svg>
                <span class="link-label">Backups</span>
            </button>
            <button class="topbar-item" data-page="users.html" data-hash="users">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="6" cy="5" r="2.8"/>
                    <path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
                    <path d="M12.5 6.5c1.2.4 2.5 1.7 2.5 3.5"/>
                    <circle cx="12" cy="4" r="2"/>
                </svg>
                <span class="link-label">Users</span>
            </button>
            <button class="topbar-item" data-page="settings.html" data-hash="settings">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="8" r="2.2"/>
                    <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
                </svg>
                <span class="link-label">Settings</span>
            </button>
            <button class="topbar-item" data-page="concepts.html" data-hash="concepts">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.5 2.5h7a2 2 0 0 1 2 2v9"/>
                    <path d="M2.5 2.5v9a2 2 0 0 0 2 2h7"/>
                    <line x1="4.5" y1="5.5" x2="9" y2="5.5"/>
                    <line x1="4.5" y1="8" x2="8" y2="8"/>
                </svg>
                <span class="link-label">Concepts</span>
            </button>
            <button class="topbar-item" id="terminalTab" data-hash="terminal" style="display:none">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="2.5" width="14" height="11" rx="1"/>
                    <path d="M4 6l2.2 2L4 10"/>
                    <line x1="8.5" y1="10.5" x2="11.5" y2="10.5"/>
                </svg>
                <span class="link-label">Terminal</span>
                <span class="term-tab-badge" id="terminalBadge" style="display:none">0</span>
            </button>
        </nav>
        <div class="topbar-user" id="topbarUser"></div>
    </div>

    <main class="app-main" id="mainContent">
        <div class="welcome">
            <div class="welcome-logo">
                <svg width="48" height="48" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
                    <circle cx="8" cy="8" r="2.2" fill="currentColor" stroke="none"/>
                    <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
                    <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
                    <circle cx="2.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="13.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="2.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="13.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            <h1>V<span class="brand-ai">ai</span>er Admin</h1>
            <p>Select a section above to get started</p>
        </div>
    </main>

    <section class="term-panel" id="terminalPanel" style="display:none">
        <div class="term-dock-bar">
            <div class="term-dock-tabs" id="terminalTabs"></div>
        </div>
        <div class="term-dock-panes" id="terminalPanes">
            <div class="term-empty" id="terminalEmpty">
                No shells open. Open one from a machine's <strong>Terminal</strong> button on Infrastructure.
            </div>
        </div>
    </section>

    <script src="avatar.js"></script>
    <script src="vendor/xterm/5.3.0/xterm.js"></script>
    <script src="vendor/xterm/5.3.0/xterm-addon-fit.js"></script>
    <script src="terminal-dock.js"></script>
    <script>
        const mainContent = document.getElementById('mainContent');
        const terminalPanel = document.getElementById('terminalPanel');
        const terminalTab = document.getElementById('terminalTab');
        const terminalBadge = document.getElementById('terminalBadge');
        const tabs = document.querySelectorAll('#adminTabs .topbar-item[data-page]');

        function clearActive() {
            document.querySelectorAll('#adminTabs .topbar-item').forEach(t => t.classList.remove('active'));
        }

        // A section (Infrastructure/Users/…) loads into the iframe; the Terminal panel is a sibling that
        // persists across these switches, so its live SSH sessions are never torn down by navigation.
        function showSection(tab) {
            const page = tab.getAttribute('data-page');
            const hash = tab.getAttribute('data-hash');
            clearActive();
            tab.classList.add('active');
            terminalPanel.style.display = 'none';
            mainContent.style.display = '';
            mainContent.innerHTML = `<iframe src="${page}"></iframe>`;
            if (window.location.hash !== '#' + hash) {
                history.replaceState(null, '', '#' + hash);
            }
        }

        function showTerminal() {
            clearActive();
            terminalTab.classList.add('active');
            mainContent.style.display = 'none';
            terminalPanel.style.display = 'flex';
            if (window.TerminalDock) TerminalDock.refitActive();
            if (window.location.hash !== '#terminal') {
                history.replaceState(null, '', '#terminal');
            }
        }

        tabs.forEach(tab => tab.addEventListener('click', () => showSection(tab)));
        terminalTab.addEventListener('click', showTerminal);

        const infraTab = document.querySelector('#adminTabs .topbar-item[data-hash="infrastructure"]');
        function goInfrastructure() { if (infraTab) showSection(infraTab); }

        // Opened from a machine card's Terminal button in the Infrastructure iframe (window.parent).
        window.vaierOpenTerminal = function (machineName) {
            showTerminal();
            if (window.TerminalDock) TerminalDock.open(machineName);
        };

        if (window.TerminalDock) {
            TerminalDock.onChange = (n) => {
                terminalBadge.textContent = n;
                terminalBadge.style.display = n > 0 ? 'inline-flex' : 'none';
                // The Terminal tab only exists while shells are open — it's a live dock, not a
                // standing section. When the last shell closes, retire the tab; and if the user
                // was sitting on the (now empty) Terminal panel, fall back to Infrastructure.
                terminalTab.style.display = n > 0 ? '' : 'none';
                if (n === 0 && terminalPanel.style.display !== 'none') {
                    goInfrastructure();
                }
            };
        }

        function loadFromHash() {
            let hash = window.location.hash.slice(1);
            if (!hash) return;
            // #terminal only resolves while shells are open (the tab is transient). A stale
            // bookmark/reload to #terminal with no live shells lands on Infrastructure instead.
            if (hash === 'terminal') {
                if (window.TerminalDock && TerminalDock.count() > 0) showTerminal();
                else goInfrastructure();
                return;
            }
            // The old #services and #vpn sections merged into #infrastructure (slice 3); keep old
            // links/bookmarks working by aliasing them, and the click() rewrites the hash.
            if (hash === 'services' || hash === 'vpn') hash = 'infrastructure';
            const tab = document.querySelector(`#adminTabs .topbar-item[data-hash="${hash}"]`);
            if (tab) tab.click();
        }

        window.addEventListener('hashchange', loadFromHash);
        loadFromHash();

        // On mobile the soft keyboard shrinks the visual viewport but not the layout viewport, which
        // would leave the terminal's bottom rows (and the prompt) hidden behind the keyboard. Bind the
        // shell height to the visual viewport so the content — and the focused shell — sits above it.
        if (window.visualViewport) {
            const syncViewport = () => {
                document.body.style.height = window.visualViewport.height + 'px';
                if (window.TerminalDock) TerminalDock.refitActive();
            };
            window.visualViewport.addEventListener('resize', syncViewport);
            window.visualViewport.addEventListener('scroll', syncViewport);
        }

        const ICON_LOGOUT = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="10 11 14 8 10 5"/><line x1="14" y1="8" x2="5" y2="8"/></svg>';

        async function loadUser() {
            const userEl = document.getElementById('topbarUser');
            try {
                const res = await fetch('/users/me', { cache: 'no-store' });
                if (!res.ok) return;
                const me = await res.json();
                if (!me.username) return;
                const name = me.displayname || me.username;
                const logout = me.logoutUrl || '#';
                // Build via the DOM: the display name is provider-owned, and setting it
                // through .title/.textContent is safe in both the attribute and text
                // contexts (escapeHtml would not escape the " that breaks out of title=).
                // The name is display-only now — there is no self-service profile page.
                const nameSpan = document.createElement('span');
                nameSpan.className = 'display-name';
                nameSpan.title = name;
                nameSpan.textContent = name;
                // Show the user's photo when one resolves (same chain as the Users cards); the name
                // rides along as tooltip/alt. On a load miss the photo swaps back to the name text.
                let profile = nameSpan;
                // The photo is a non-essential enhancement — never let it break the name + Logout
                // controls. If avatar.js failed to load, the bare VaierAvatar reference throws a
                // ReferenceError the catch swallows (it's a top-level const, not a window property,
                // so window.VaierAvatar wouldn't see it); on any miss we keep the name text.
                let photoUrl = null;
                try {
                    photoUrl = await VaierAvatar.photoUrl({
                        provider: me.provider, providerUserId: me.providerUserId, email: me.email, size: 48 });
                } catch (_) { /* keep the name text */ }
                if (photoUrl) {
                    const img = document.createElement('img');
                    img.className = 'topbar-avatar';
                    img.src = photoUrl;
                    img.alt = name;
                    img.title = name;
                    img.onerror = () => img.replaceWith(nameSpan);
                    profile = img;
                }
                const logoutLink = document.createElement('a');
                logoutLink.href = logout;
                logoutLink.className = 'topbar-item';
                logoutLink.title = 'Logout';
                logoutLink.setAttribute('aria-label', 'Logout');
                logoutLink.innerHTML = ICON_LOGOUT; // trusted constant SVG
                userEl.replaceChildren(profile, logoutLink);
            } catch (_) {}
        }

        loadUser();
    </script>
</body>
</html>
