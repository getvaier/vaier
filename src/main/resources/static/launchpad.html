<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaier</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22none%22 stroke=%22%234fc3f7%22 stroke-width=%221.5%22 stroke-linecap=%22round%22><circle cx=%228%22 cy=%228%22 r=%222.2%22 fill=%22%234fc3f7%22 stroke=%22none%22/><line x1=%222.5%22 y1=%223.5%22 x2=%226%22 y2=%226.5%22/><line x1=%2213.5%22 y1=%223.5%22 x2=%2210%22 y2=%226.5%22/><line x1=%222.5%22 y1=%2212.5%22 x2=%226%22 y2=%229.5%22/><line x1=%2213.5%22 y1=%2212.5%22 x2=%2210%22 y2=%229.5%22/><circle cx=%222.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%222.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/></svg>">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { min-height: 100vh; }

        .content {
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .tile {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: background 0.12s, border-color 0.12s;
            cursor: pointer;
        }

        .tile:hover {
            background: var(--bg-hover);
            border-color: #555;
            text-decoration: none;
            color: var(--text);
        }

        .tile.down {
            opacity: 0.4;
        }

        .tile.down:hover {
            opacity: 0.7;
        }

        .tile-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .tile-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .tile-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            min-width: 0;
        }

        .tile-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-peer {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .empty {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .peer-section {
            margin-bottom: 2rem;
        }

        .peer-section:last-child {
            margin-bottom: 0;
        }

        .peer-heading {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.625rem;
            }
            .content { padding: 1.25rem 1rem; }
            .tile {
                padding: 0.875rem 0.875rem;
                gap: 0.625rem;
            }
            .tile-icon {
                width: 40px;
                height: 40px;
            }
            .tile-name {
                font-size: 0.95rem;
            }
            .tile-peer {
                display: none;
            }
            .peer-heading {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/launchpad.html" class="topbar-brand" aria-label="Vaier">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="8" cy="8" r="2.2" fill="currentColor" stroke="none"/>
                <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
                <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
                <circle cx="2.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="2.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            <span>Vaier</span>
        </a>
        <nav class="topbar-nav" id="topbarNav"></nav>
        <div class="topbar-user" id="topbarUser"></div>
    </div>

    <div class="content">
        <div id="grid">
        </div>
    </div>

    <script>
        const ICON_LOGOUT   = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="10 11 14 8 10 5"/><line x1="14" y1="8" x2="5" y2="8"/></svg>';
        const ICON_LOGIN    = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-3"/><polyline points="6 11 2 8 6 5"/><line x1="2" y1="8" x2="11" y2="8"/></svg>';
        const ICON_SERVICES = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2" width="13" height="4.5" rx="1"/><rect x="1.5" y="9.5" width="13" height="4.5" rx="1"/><circle cx="4" cy="4.25" r="0.8" fill="currentColor" stroke="none"/><circle cx="4" cy="11.75" r="0.8" fill="currentColor" stroke="none"/><line x1="7" y1="4.25" x2="11" y2="4.25" stroke-width="1"/><line x1="7" y1="11.75" x2="11" y2="11.75" stroke-width="1"/></svg>';
        const ICON_MACHINES = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="14" height="10" rx="1"/><line x1="5" y1="15" x2="11" y2="15"/><line x1="8" y1="12" x2="8" y2="15"/></svg>';
        const ICON_USERS    = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="5" r="2.8"/><path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/><path d="M12.5 6.5c1.2.4 2.5 1.7 2.5 3.5"/><circle cx="12" cy="4" r="2"/></svg>';
        const ICON_SETTINGS = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>';

        async function loadTopbarNav() {
            const nav = document.getElementById('topbarNav');
            const user = document.getElementById('topbarUser');
            let me = null;
            try {
                const res = await fetch('/users/me', { redirect: 'manual', cache: 'no-store' });
                if (res.ok && res.headers.get('content-type')?.includes('application/json')) {
                    me = await res.json();
                }
            } catch (_) { /* anonymous */ }

            if (me && me.username) {
                const name = me.displayname || me.username;
                const logout = me.logoutUrl || '#';
                nav.innerHTML = `
                    <a href="/admin.html#services" class="topbar-item">${ICON_SERVICES}<span class="link-label">Services</span></a>
                    <a href="/admin.html#vpn" class="topbar-item">${ICON_MACHINES}<span class="link-label">Machines</span></a>
                    <a href="/admin.html#users" class="topbar-item">${ICON_USERS}<span class="link-label">Users</span></a>
                    <a href="/admin.html#settings" class="topbar-item">${ICON_SETTINGS}<span class="link-label">Settings</span></a>
                `;
                user.innerHTML = `
                    <a href="/mypage.html" class="display-name" title="${name}">${name}</a>
                    <a href="${logout}" class="topbar-item" title="Logout" aria-label="Logout">${ICON_LOGOUT}</a>
                `;
            } else {
                const login = (me && me.loginUrl) || '/admin.html';
                nav.innerHTML = '';
                user.innerHTML = `
                    <a href="${login}" class="topbar-item" title="Sign in">${ICON_LOGIN}<span class="link-label">Sign in</span></a>
                `;
            }
        }

        loadTopbarNav();

        const AVATAR_COLORS = [
            '#0e639c', '#1a7340', '#7c4dbd', '#c0392b',
            '#b45309', '#0f766e', '#9d174d', '#374151',
            '#166534', '#6d28d9',
        ];

        function avatarColor(name) {
            let h = 0;
            for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
            return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
        }

        function serviceName(dnsAddress) {
            return dnsAddress.split('.')[0];
        }

        function peerName(dnsAddress, hostAddress) {
            if (hostAddress && hostAddress.startsWith('172.20.')) return 'local';
            if (hostAddress && !hostAddress.includes('.')) return 'local';
            const parts = dnsAddress.split('.');
            return parts.length >= 2 ? parts[1] : 'local';
        }

        function renderTile(service) {
            const url    = service.url;
            const name   = serviceName(service.dnsAddress);
            const color  = avatarColor(name);
            const letter = name.charAt(0).toUpperCase();
            const peer   = peerName(service.dnsAddress, service.hostAddress);

            const tile = document.createElement('a');
            tile.href = url;
            tile.target = service.dnsAddress;
            tile.rel = '';
            tile.className = service.state === 'OK' ? 'tile' : 'tile down';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'tile-icon';

            const FAVICON_PATHS = [
                `/favicon?host=${encodeURIComponent(service.dnsAddress)}`,
            ];

            const img = document.createElement('img');
            img.alt = '';
            let attempt = 0;
            img.onerror = () => {
                attempt++;
                if (attempt < FAVICON_PATHS.length) {
                    img.src = FAVICON_PATHS[attempt];
                } else {
                    img.remove();
                    iconDiv.style.background = color;
                    iconDiv.textContent = letter;
                }
            };
            img.src = FAVICON_PATHS[0];
            iconDiv.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'tile-info';
            infoDiv.innerHTML = `
                <div class="tile-name">${name}</div>
                <div class="tile-peer">${peer}</div>
            `;

            tile.appendChild(iconDiv);
            tile.appendChild(infoDiv);
            return tile;
        }

        let _hasRendered = false;

        async function fetchWithRetry(url, attempts = 4) {
            let lastErr;
            for (let i = 0; i < attempts; i++) {
                try {
                    const res = await fetch(url, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res;
                } catch (e) {
                    lastErr = e;
                    if (i < attempts - 1) await new Promise(r => setTimeout(r, 400 * Math.pow(2, i)));
                }
            }
            throw lastErr;
        }

        async function load() {
            const container = document.getElementById('grid');
            try {
                const res = await fetchWithRetry('/launchpad/services');
                const services = await res.json();
                const external = services.filter(s => !s.dnsAddress.startsWith('vaier.'));
                container.innerHTML = '';
                _hasRendered = true;
                if (external.length === 0) {
                    container.innerHTML = '<div class="empty">No services published yet.<br>Use <a href="/admin.html">Admin</a> to add services.</div>';
                    return;
                }

                const byPeer = new Map();
                for (const s of external) {
                    const peer = peerName(s.dnsAddress, s.hostAddress);
                    if (!byPeer.has(peer)) byPeer.set(peer, []);
                    byPeer.get(peer).push(s);
                }

                const sortedPeers = [...byPeer.keys()].sort((a, b) => a.localeCompare(b));

                for (const peer of sortedPeers) {
                    const peerServices = byPeer.get(peer).sort((a, b) =>
                        serviceName(a.dnsAddress).localeCompare(serviceName(b.dnsAddress))
                    );

                    const section = document.createElement('div');
                    section.className = 'peer-section';

                    const heading = document.createElement('div');
                    heading.className = 'peer-heading';
                    heading.textContent = peer;
                    section.appendChild(heading);

                    const grid = document.createElement('div');
                    grid.className = 'grid';
                    peerServices.forEach(s => grid.appendChild(renderTile(s)));
                    section.appendChild(grid);

                    container.appendChild(section);
                }
            } catch (e) {
                if (!_hasRendered) {
                    container.innerHTML = `<div class="empty">Failed to load services: ${e.message}</div>`;
                }
            }
        }

        load();

        const _sse = new EventSource('/published-services/events');
        _sse.addEventListener('service-updated', () => load());
        let _sseConnected = false;
        _sse.onopen = () => { if (_sseConnected) load(); _sseConnected = true; };
        _sse.onerror = () => load();

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') load();
        });
        window.addEventListener('online', () => load());
        window.addEventListener('focus', () => load());
    </script>
</body>
</html>
