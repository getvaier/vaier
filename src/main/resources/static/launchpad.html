<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaier</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⬡</text></svg>">
    <style>
        :root {
            --bg:       #1e1e1e;
            --bg-card:  #2d2d30;
            --bg-hover: #37373d;
            --border:   #3c3c3c;
            --text:     #d4d4d4;
            --text-muted: #858585;
            --text-dim: #5a5a5a;
            --accent:   #4fc3f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 44px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-decoration: none;
        }

        .logo svg { flex-shrink: 0; }

        .admin-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid transparent;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }

        .admin-link:hover {
            color: var(--text);
            background: var(--bg-hover);
            border-color: var(--border);
            text-decoration: none;
        }

        .admin-link svg { flex-shrink: 0; }

        .content {
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .tile {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: background 0.12s, border-color 0.12s;
            cursor: pointer;
        }

        .tile:hover {
            background: var(--bg-hover);
            border-color: #555;
            text-decoration: none;
            color: var(--text);
        }

        .tile.down {
            opacity: 0.4;
        }

        .tile.down:hover {
            opacity: 0.7;
        }

        .tile-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .tile-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .tile-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            min-width: 0;
        }

        .tile-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tile-peer {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .empty {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .peer-section {
            margin-bottom: 2rem;
        }

        .peer-section:last-child {
            margin-bottom: 0;
        }

        .peer-heading {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.625rem;
            }
            .content { padding: 1.25rem 1rem; }
            .tile {
                padding: 0.875rem 0.875rem;
                gap: 0.625rem;
            }
            .tile-icon {
                width: 40px;
                height: 40px;
            }
            .tile-name {
                font-size: 0.95rem;
            }
            .tile-peer {
                display: none;
            }
            .peer-heading {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="8" cy="8" r="2.2" fill="currentColor" stroke="none"/>
                <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
                <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
                <circle cx="2.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="2.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="13.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            Vaier
        </div>
        <a href="/admin.html" class="admin-link" title="Admin">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11.5 2.5a1.5 1.5 0 0 1 2.1 2.1L5 13.2l-3 .8.8-3 8.7-8.5z"/>
            </svg>
            Admin
        </a>
    </div>

    <div class="content">
        <div id="grid">
        </div>
    </div>

    <script>
        const AVATAR_COLORS = [
            '#0e639c', '#1a7340', '#7c4dbd', '#c0392b',
            '#b45309', '#0f766e', '#9d174d', '#374151',
            '#166534', '#6d28d9',
        ];

        function avatarColor(name) {
            let h = 0;
            for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
            return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
        }

        function serviceName(dnsAddress) {
            return dnsAddress.split('.')[0];
        }

        function peerName(dnsAddress, hostAddress) {
            if (hostAddress && hostAddress.startsWith('172.20.')) return 'local';
            const parts = dnsAddress.split('.');
            return parts.length >= 2 ? parts[1] : 'local';
        }

        function renderTile(service) {
            const url    = `https://${service.dnsAddress}`;
            const name   = serviceName(service.dnsAddress);
            const color  = avatarColor(name);
            const letter = name.charAt(0).toUpperCase();
            const peer   = peerName(service.dnsAddress, service.hostAddress);

            const tile = document.createElement('a');
            tile.href = url;
            tile.target = service.dnsAddress;
            tile.rel = '';
            tile.className = service.state === 'OK' ? 'tile' : 'tile down';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'tile-icon';

            const FAVICON_PATHS = [
                `/favicon?host=${encodeURIComponent(service.dnsAddress)}`,
            ];

            const img = document.createElement('img');
            img.alt = '';
            let attempt = 0;
            img.onerror = () => {
                attempt++;
                if (attempt < FAVICON_PATHS.length) {
                    img.src = FAVICON_PATHS[attempt];
                } else {
                    img.remove();
                    iconDiv.style.background = color;
                    iconDiv.textContent = letter;
                }
            };
            img.src = FAVICON_PATHS[0];
            iconDiv.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'tile-info';
            infoDiv.innerHTML = `
                <div class="tile-name">${name}</div>
                <div class="tile-peer">${peer}</div>
            `;

            tile.appendChild(iconDiv);
            tile.appendChild(infoDiv);
            return tile;
        }

        async function load() {
            const container = document.getElementById('grid');
            try {
                const res = await fetch('/launchpad/services');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const services = await res.json();
                const external = services.filter(s => !s.dnsAddress.startsWith('vaier.'));
                container.innerHTML = '';
                if (external.length === 0) {
                    container.innerHTML = '<div class="empty">No services published yet.<br>Use <a href="/admin.html">Admin</a> to add services.</div>';
                    return;
                }

                const byPeer = new Map();
                for (const s of external) {
                    const peer = peerName(s.dnsAddress, s.hostAddress);
                    if (!byPeer.has(peer)) byPeer.set(peer, []);
                    byPeer.get(peer).push(s);
                }

                const sortedPeers = [...byPeer.keys()].sort((a, b) => a.localeCompare(b));

                for (const peer of sortedPeers) {
                    const peerServices = byPeer.get(peer).sort((a, b) =>
                        serviceName(a.dnsAddress).localeCompare(serviceName(b.dnsAddress))
                    );

                    const section = document.createElement('div');
                    section.className = 'peer-section';

                    const heading = document.createElement('div');
                    heading.className = 'peer-heading';
                    heading.textContent = peer;
                    section.appendChild(heading);

                    const grid = document.createElement('div');
                    grid.className = 'grid';
                    peerServices.forEach(s => grid.appendChild(renderTile(s)));
                    section.appendChild(grid);

                    container.appendChild(section);
                }
            } catch (e) {
                container.innerHTML = `<div class="empty">Failed to load services: ${e.message}</div>`;
            }
        }

        load();

        const _sse = new EventSource('/published-services/events');
        _sse.addEventListener('service-updated', () => load());
        let _sseConnected = false;
        _sse.onopen = () => { if (_sseConnected) load(); _sseConnected = true; };
        _sse.onerror = () => load();
    </script>
</body>
</html>
