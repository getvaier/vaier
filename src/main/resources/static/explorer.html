<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Explorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22none%22 stroke=%22%234fc3f7%22 stroke-width=%221.5%22 stroke-linecap=%22round%22><circle cx=%228%22 cy=%228%22 r=%222.2%22 fill=%22%234fc3f7%22 stroke=%22none%22/><line x1=%222.5%22 y1=%223.5%22 x2=%226%22 y2=%226.5%22/><line x1=%2213.5%22 y1=%223.5%22 x2=%2210%22 y2=%226.5%22/><line x1=%222.5%22 y1=%2212.5%22 x2=%226%22 y2=%229.5%22/><line x1=%2213.5%22 y1=%2212.5%22 x2=%2210%22 y2=%229.5%22/><circle cx=%222.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%222.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor/xterm/5.3.0/xterm.css">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
    <link rel="stylesheet" href="vendor/leaflet-markercluster/MarkerCluster.css">
    <link rel="stylesheet" href="vendor/leaflet-markercluster/MarkerCluster.Default.css">
    <link rel="stylesheet" href="explorer-shell.css">
</head>
<body>
    <!-- The Explorer shell (#323 slice A): one tree spanning the fleet, and the renderer for whatever is
         selected in it. Unlike every page before it this is not a section inside admin.html's iframe. A
         machine's shell opens in its own pop-out window (terminal-window.js), reattaching to one persistent
         tmux session per machine — the single shell model, no embedded dock. -->
    <div class="ex-app" data-past="0">

        <header class="topbar">
            <!-- On a phone the tree is a drawer, not a column; this reveals it. Hidden on wide screens, where
                 the tree is always present and there is nothing to toggle. -->
            <button class="ex-menu" id="exMenuBtn" aria-label="Open the fleet tree" aria-expanded="false" aria-controls="exTree">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <line x1="2.5" y1="4.5" x2="13.5" y2="4.5"/>
                    <line x1="2.5" y1="8" x2="13.5" y2="8"/>
                    <line x1="2.5" y1="11.5" x2="13.5" y2="11.5"/>
                </svg>
            </button>
            <a href="/launchpad.html" class="topbar-brand" aria-label="Vaier">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <circle cx="8" cy="8" r="2.2" fill="currentColor" stroke="none"/>
                    <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
                    <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
                    <circle cx="2.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="13.5" cy="3.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="2.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="13.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
                <span>V<span class="brand-ai">ai</span>er</span>
            </a>

            <!-- The address bar is the chrome: where you are is the only navigation state there is. -->
            <nav class="ex-addressbar" id="exCrumbs" aria-label="Path"></nav>

            <button class="ex-kbd" id="exPalBtn" title="Search the fleet" aria-label="Search the fleet">
                <svg class="ex-kbd-ico" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
                </svg>
                <span class="ex-kbd-lbl">Search the fleet</span><span class="ex-kbd-chip">⌘K</span>
            </button>
            <div class="topbar-user" id="topbarUser"></div>
        </header>

        <div class="ex-main">
            <nav class="ex-tree" id="exTree" aria-label="Fleet"></nav>
            <!-- Dims the pane behind the drawer on a phone; a tap here closes it. Inert on wide screens. -->
            <div class="ex-tree-scrim" id="exTreeScrim" aria-hidden="true"></div>
            <main class="ex-pane" id="exPane"></main>
        </div>
        <!-- A machine's shell opens in its own pop-out window (terminal-window.js), the single shell model here:
             one window per machine, reattaching to the same tmux session every time. There is no embedded dock. -->
    </div>

    <!-- App-level overlay layer — what the iframe never allowed. The Clipboard tray (held coordinates + live
         Transfers) and a toast slot, docked above the dock, out of the tree's way until there's something to say. -->
    <aside class="ex-clip" id="exClip" aria-label="Clipboard and transfers"></aside>
    <div class="ex-toast" id="exToast" role="status" aria-live="polite"></div>

    <!-- One namespace, one search: every entry in the tree, by its path. -->
    <div class="ex-scrim" id="exScrim">
        <div class="ex-pal" role="dialog" aria-label="Search the fleet">
            <input id="exPalInput" placeholder="Go to a path — machine, files, shell…"
                   autocomplete="off" spellcheck="false">
            <div class="ex-pal-list" id="exPalList"></div>
        </div>
    </div>

    <script src="avatar.js"></script>
    <script src="vendor/xterm/5.3.0/xterm.js"></script>
    <script src="vendor/xterm/5.3.0/xterm-addon-fit.js"></script>
    <script src="vendor/xterm/5.3.0/xterm-addon-web-links.js"></script>
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/leaflet-markercluster/leaflet.markercluster.js"></script>
    <script src="terminal-panes.js"></script>
    <script src="explorer-listing.js"></script>
    <script src="explorer-shell.js"></script>
</body>
</html>
