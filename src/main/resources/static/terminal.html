<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>Shell</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22none%22 stroke=%22%234cc9e6%22 stroke-width=%221.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><rect x=%222%22 y=%223%22 width=%2212%22 height=%2210%22 rx=%221.5%22/><path d=%22M5 7l2 1.5-2 1.5%22/><line x1=%228.5%22 y1=%2210%22 x2=%2211%22 y2=%2210%22/></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor/xterm/5.3.0/xterm.css">
    <link rel="stylesheet" href="terminal-window.css">
</head>
<body class="tw">
    <!-- A single shell, filling the window. The dock (terminal-dock.js) tiles many panes inside one page; this
         is the other model — one shell per OS window, arranged by the window manager. Same WebSocket protocol,
         same session ownership (terminal-panes.js), so a shell popped out of the dock is the same tmux session. -->
    <header class="tw-bar">
        <span class="tw-dot" id="twDot"></span>
        <span class="tw-name" id="twName"></span>
        <span class="tw-status" id="twStatus"></span>
        <span class="tw-actions" id="twActions"></span>
    </header>
    <div class="tw-main">
        <div class="tw-term" id="twTerm"></div>
    </div>
    <!-- The on-screen key row a soft keyboard can't reach — Esc/Tab/arrows and sticky Ctrl/Alt. Shown only on
         a phone (terminal-window.css), filled by terminal-window.js. -->
    <div class="tw-keys" id="twKeys" role="group" aria-label="Terminal keys"></div>

    <script src="vendor/xterm/5.3.0/xterm.js"></script>
    <script src="vendor/xterm/5.3.0/xterm-addon-fit.js"></script>
    <script src="vendor/xterm/5.3.0/xterm-addon-web-links.js"></script>
    <script src="terminal-panes.js"></script>
    <script src="terminal-window.js"></script>
</body>
</html>
