<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 3px;
            background: #0e639c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.95rem;
            flex-shrink: 0;
            font-family: var(--mono);
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        .user-actions {
            display: flex;
            gap: 0.3rem;
        }

        @media (max-width: 600px) {
            .user-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .user-actions {
                width: 100%;
            }

            .user-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title">
            <!-- Users icon -->
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="5" r="2.8"/>
                <path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
                <path d="M12.5 6.5c1.2.4 2.5 1.7 2.5 3.5"/>
                <circle cx="12" cy="4" r="2"/>
            </svg>
            Users
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
        </div>
    </div>

    <div class="container">
        <div id="message"></div>
        <div id="users-container">
            <div class="loading">Loading users…</div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add New User</div>
            <form id="addUserForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="newUsername" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-input" id="newDisplayname" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="newEmail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="newPassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addUserModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Change Password</div>
            <form id="changePasswordForm">
                <input type="hidden" id="changePasswordUsername">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="changePassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('changePasswordModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let users = [];

        async function fetchUsers() {
            try {
                const response = await fetch('/users');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                users = await response.json();
                displayUsers();
            } catch (error) {
                displayMessage(`Failed to load users: ${error.message}`, 'error');
            }
        }

        function displayUsers() {
            const container = document.getElementById('users-container');
            if (users.length === 0) {
                container.innerHTML = '<div class="loading">No users found</div>';
                return;
            }

            const html = users.map(user => `
                <div class="user-card">
                    <div class="user-info">
                        <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                        <div class="user-name">${user.name}</div>
                    </div>
                    <div class="user-actions">
                        <button class="btn btn-small btn-secondary" onclick="showChangePasswordModal('${user.name}')">passwd</button>
                        <button class="btn btn-small btn-danger"    onclick="deleteUser('${user.name}')">
                            <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
                        </button>
                    </div>
                </div>`).join('');

            container.innerHTML = `<div class="card-grid">${html}</div>`;
        }

        function displayMessage(message, type) {
            const el = document.getElementById('message');
            el.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('active');
        }

        function showChangePasswordModal(username) {
            document.getElementById('changePasswordUsername').value = username;
            document.getElementById('changePasswordModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.getElementById('addUserForm').addEventListener('submit', async e => {
            e.preventDefault();
            try {
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username:    document.getElementById('newUsername').value,
                        displayname: document.getElementById('newDisplayname').value,
                        email:       document.getElementById('newEmail').value,
                        password:    document.getElementById('newPassword').value,
                    })
                });
                const message = await response.text();
                if (response.ok) {
                    displayMessage(message, 'success');
                    closeModal('addUserModal');
                    document.getElementById('addUserForm').reset();
                    fetchUsers();
                } else {
                    displayMessage(message, 'error');
                }
            } catch (error) {
                displayMessage(`Failed to add user: ${error.message}`, 'error');
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async e => {
            e.preventDefault();
            const username    = document.getElementById('changePasswordUsername').value;
            const newPassword = document.getElementById('changePassword').value;
            try {
                const response = await fetch(`/users/${username}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                const message = await response.text();
                if (response.ok) {
                    displayMessage(message, 'success');
                    closeModal('changePasswordModal');
                    document.getElementById('changePasswordForm').reset();
                } else {
                    displayMessage(message, 'error');
                }
            } catch (error) {
                displayMessage(`Failed to change password: ${error.message}`, 'error');
            }
        });

        async function deleteUser(username) {
            if (!confirm(`Delete user '${username}'?`)) return;
            try {
                const response = await fetch(`/users/${username}`, { method: 'DELETE' });
                const message  = await response.text();
                displayMessage(message, response.ok ? 'success' : 'error');
                if (response.ok) fetchUsers();
            } catch (error) {
                displayMessage(`Failed to delete user: ${error.message}`, 'error');
            }
        }

        window.addEventListener('click', e => {
            if (e.target.classList.contains('modal')) e.target.classList.remove('active');
        });

        fetchUsers();
    </script>
</body>
</html>
