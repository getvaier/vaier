<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            cursor: pointer;
            user-select: none;
        }

        .user-header:hover { background: var(--bg-hover); }

        .user-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 3px;
            background: #0e639c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.95rem;
            flex-shrink: 0;
            font-family: var(--mono);
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        .user-displayname {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .user-chevron {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-left: 0.25rem;
            transition: transform 0.15s;
            display: inline-block;
        }

        .user-chevron.open { transform: rotate(180deg); }

        .user-body {
            display: none;
            padding: 0 1rem 1rem;
            border-top: 1px solid var(--border);
        }

        .user-body.open { display: block; }

        .user-details {
            display: grid;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .groups-edit-row {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .groups-edit-row .form-input {
            flex: 1;
            min-width: 200px;
        }

        .groups-picker {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            min-height: 1.6rem;
            align-items: center;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.15rem 0.45rem;
            background: #0e639c;
            color: #fff;
            border-radius: 2px;
            font-family: var(--mono);
            font-size: 0.78rem;
        }

        .chip-remove {
            background: none;
            border: 0;
            color: #fff;
            cursor: pointer;
            padding: 0;
            font-size: 0.95rem;
            line-height: 1;
            opacity: 0.8;
        }

        .chip-remove:hover { opacity: 1; }

        .chip-empty {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .chip-input-row {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .chip-input-row .form-input {
            flex: 1;
            min-width: 0;
        }

        .groups-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .group-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.3rem;
            background: var(--bg-card);
        }

        .group-name {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text);
        }

        .group-empty {
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 0.5rem;
        }

        @media (max-width: 600px) {
            .user-header { flex-wrap: wrap; gap: 0.4rem; padding: 0.6rem 0.75rem; }
            .user-header-left { flex: 1 1 100%; }
            .user-actions { flex: 1 1 100%; flex-wrap: wrap; }
            .user-body { padding: 0 0.75rem 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="message"></div>
        <div class="groups-toolbar">
            <button class="btn btn-small btn-secondary" onclick="showManageGroupsModal()">Manage groups</button>
        </div>
        <div id="users-container">
            <div class="loading">Loading users…</div>
        </div>
    </div>
    <button class="fab" onclick="showAddUserModal()" aria-label="Add User" title="Add User">+</button>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add New User</div>
            <form id="addUserForm">
                <div id="addUserError" style="display:none"></div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="newUsername" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-input" id="newDisplayname" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="newEmail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Groups</label>
                    <div id="newGroupsPicker"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addUserModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete User Modal -->
    <div id="deleteUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Delete User</div>
            <div id="deleteUserError" style="display:none"></div>
            <p style="font-size:0.85rem;color:var(--text-muted)">
                Remove <code style="color:var(--text);background:var(--bg-input);padding:0.1rem 0.3rem;border-radius:2px" id="deleteUsername"></code>?
            </p>
            <p style="font-size:0.78rem;color:var(--red);margin-top:0.5rem;">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('deleteUserModal')">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Change Password</div>
            <form id="changePasswordForm">
                <input type="hidden" id="changePasswordUsername">
                <div id="changePasswordError" style="display:none"></div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="changePassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('changePasswordModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Manage Groups Modal -->
    <div id="manageGroupsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Manage Groups</div>
            <div id="manageGroupsError" style="display:none"></div>
            <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem">
                Deleting a group removes it from every user.
            </p>
            <div id="manageGroupsList">
                <div class="loading">Loading…</div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('manageGroupsModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Delete Group Confirmation Modal -->
    <div id="deleteGroupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Delete Group</div>
            <div id="deleteGroupError" style="display:none"></div>
            <p style="font-size:0.85rem;color:var(--text-muted)">
                Remove group <code style="color:var(--text);background:var(--bg-input);padding:0.1rem 0.3rem;border-radius:2px" id="deleteGroupName"></code> from all users?
            </p>
            <p style="font-size:0.78rem;color:var(--red);margin-top:0.5rem;">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('deleteGroupModal')">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDeleteGroup()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let users = [];
        let allGroups = [];
        const expandedUsers = new Set();
        const pickers = new Map();

        async function fetchUsers() {
            try {
                const response = await fetch('/users');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                users = await response.json();
                displayUsers();
            } catch (error) {
                displayMessage(`Failed to load users: ${error.message}`, 'error');
            }
        }

        async function fetchAllGroups() {
            try {
                const response = await fetch('/groups');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allGroups = await response.json();
            } catch (error) {
                allGroups = [];
            }
        }

        function knownGroupsUnion(extra) {
            const set = new Set(allGroups);
            (extra || []).forEach(g => set.add(g));
            return [...set].sort();
        }

        function mountGroupsPicker(containerId, pickerId, initial) {
            pickers.set(pickerId, { selected: new Set(initial) });
            const options = knownGroupsUnion(initial)
                .map(g => `<option value="${escapeHtml(g)}">`).join('');
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `
                <div class="groups-picker">
                    <div class="chip-list" id="chips-${pickerId}"></div>
                    <div class="chip-input-row">
                        <input type="text" class="form-input chip-input" id="chip-input-${pickerId}"
                               list="groups-datalist-${pickerId}" placeholder="Add group…"
                               autocomplete="off">
                        <button type="button" class="btn btn-small btn-secondary"
                                onclick="addChip('${pickerId}')">Add</button>
                    </div>
                    <datalist id="groups-datalist-${pickerId}">${options}</datalist>
                </div>`;
            const input = document.getElementById('chip-input-' + pickerId);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addChip(pickerId);
                }
            });
            renderChips(pickerId);
        }

        function renderChips(pickerId) {
            const state = pickers.get(pickerId);
            const list = document.getElementById('chips-' + pickerId);
            if (!state || !list) return;
            if (state.selected.size === 0) {
                list.innerHTML = '<span class="chip-empty">No groups</span>';
                return;
            }
            list.innerHTML = [...state.selected].sort().map(g => {
                const safe = g.replace(/'/g, "\\'");
                return `<span class="chip">${escapeHtml(g)}<button type="button" class="chip-remove"
                        onclick="removeChip('${pickerId}','${safe}')">×</button></span>`;
            }).join('');
        }

        function addChip(pickerId) {
            const input = document.getElementById('chip-input-' + pickerId);
            if (!input) return;
            const value = (input.value || '').trim();
            if (!value) return;
            const state = pickers.get(pickerId);
            if (!state) return;
            state.selected.add(value);
            input.value = '';
            renderChips(pickerId);
        }

        function removeChip(pickerId, group) {
            const state = pickers.get(pickerId);
            if (!state) return;
            state.selected.delete(group);
            renderChips(pickerId);
        }

        function getPickerGroups(pickerId) {
            const state = pickers.get(pickerId);
            return state ? [...state.selected] : [];
        }

        function cardId(name) {
            return name.replace(/[^a-zA-Z0-9]/g, '_');
        }

        function toggleUser(name) {
            const id = cardId(name);
            const body = document.getElementById('body-' + id);
            const chevron = document.getElementById('chevron-' + id);
            if (!body) return;
            if (expandedUsers.has(name)) {
                expandedUsers.delete(name);
                body.classList.remove('open');
                chevron.classList.remove('open');
            } else {
                expandedUsers.add(name);
                body.classList.add('open');
                chevron.classList.add('open');
            }
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function displayUsers() {
            const container = document.getElementById('users-container');
            if (users.length === 0) {
                container.innerHTML = '<div class="loading">No users found</div>';
                return;
            }

            const html = users.map(user => {
                const id = cardId(user.name);
                const isExpanded = expandedUsers.has(user.name);
                const displayname = user.displayname || user.name;
                const email = user.email || '';
                return `
                <div class="user-card">
                    <div class="user-header" onclick="toggleUser('${user.name.replace(/'/g, "\\'")}')">
                        <div class="user-header-left">
                            <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                            <div>
                                <div class="user-name">${escapeHtml(user.name)}</div>
                                <div class="user-displayname">${escapeHtml(displayname)}</div>
                            </div>
                        </div>
                        <div class="user-actions">
                            <button class="btn btn-small btn-secondary" onclick="event.stopPropagation();showChangePasswordModal('${user.name}')">passwd</button>
                            <button class="btn btn-small btn-danger" onclick="event.stopPropagation();deleteUser('${user.name}')">
                                <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
                            </button>
                            <span class="user-chevron ${isExpanded ? 'open' : ''}" id="chevron-${id}">▼</span>
                        </div>
                    </div>
                    <div class="user-body ${isExpanded ? 'open' : ''}" id="body-${id}">
                        <div class="user-details">
                            <div class="detail-row">
                                <span class="detail-label">Display Name</span>
                                <span class="detail-value">${escapeHtml(displayname)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Email</span>
                                <span class="detail-value">${escapeHtml(email)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Groups</span>
                                <span class="detail-value">
                                    <div class="groups-edit-row">
                                        <div id="groups-picker-${id}" style="flex:1;min-width:200px"></div>
                                        <button class="btn btn-small btn-secondary" onclick="saveUserGroups('${user.name.replace(/'/g, "\\'")}')">Save</button>
                                    </div>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;

            users.forEach(user => {
                const id = cardId(user.name);
                mountGroupsPicker('groups-picker-' + id, 'user-' + id, user.groups || []);
            });
        }

        async function saveUserGroups(username) {
            const groups = getPickerGroups('user-' + cardId(username));
            try {
                const response = await fetch(`/users/${username}/groups`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groups })
                });
                const message = await response.text();
                if (response.ok) {
                    displayMessage(message, 'success');
                    await fetchAllGroups();
                    fetchUsers();
                } else {
                    displayMessage(message, 'error');
                }
            } catch (error) {
                displayMessage(`Failed to update groups: ${error.message}`, 'error');
            }
        }

        function displayMessage(message, type) {
            const el = document.getElementById('message');
            el.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        function showModalError(errorElId, message) {
            const el = document.getElementById(errorElId);
            el.className = 'error';
            el.textContent = message;
            el.style.display = '';
        }

        function clearModalError(errorElId) {
            const el = document.getElementById(errorElId);
            el.style.display = 'none';
            el.textContent = '';
        }

        async function showAddUserModal() {
            clearModalError('addUserError');
            await fetchAllGroups();
            mountGroupsPicker('newGroupsPicker', 'new-user', ['admins']);
            document.getElementById('addUserModal').classList.add('active');
        }

        function showChangePasswordModal(username) {
            clearModalError('changePasswordError');
            document.getElementById('changePasswordUsername').value = username;
            document.getElementById('changePasswordModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        async function showManageGroupsModal() {
            clearModalError('manageGroupsError');
            document.getElementById('manageGroupsModal').classList.add('active');
            await renderGroupsList();
        }

        async function renderGroupsList() {
            const list = document.getElementById('manageGroupsList');
            list.innerHTML = '<div class="loading">Loading…</div>';
            try {
                const response = await fetch('/groups');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const groups = await response.json();
                if (!groups.length) {
                    list.innerHTML = '<div class="group-empty">No groups in use.</div>';
                    return;
                }
                list.innerHTML = groups.map(g => `
                    <div class="group-row">
                        <span class="group-name">${escapeHtml(g)}</span>
                        <button class="btn btn-small btn-danger" onclick="deleteGroup('${g.replace(/'/g, "\\'")}')">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = `<div class="error">Failed to load groups: ${escapeHtml(error.message)}</div>`;
            }
        }

        let groupToDelete = null;

        function deleteGroup(groupName) {
            groupToDelete = groupName;
            clearModalError('deleteGroupError');
            document.getElementById('deleteGroupName').textContent = groupName;
            document.getElementById('deleteGroupModal').classList.add('active');
        }

        async function confirmDeleteGroup() {
            if (!groupToDelete) return;
            const name = groupToDelete;
            clearModalError('deleteGroupError');
            try {
                const response = await fetch(`/groups/${encodeURIComponent(name)}`, { method: 'DELETE' });
                const message = await response.text();
                if (response.ok) {
                    closeModal('deleteGroupModal');
                    displayMessage(message, 'success');
                    groupToDelete = null;
                    await fetchAllGroups();
                    await renderGroupsList();
                    fetchUsers();
                } else {
                    showModalError('deleteGroupError', message);
                }
            } catch (error) {
                showModalError('deleteGroupError', `Failed to delete group: ${error.message}`);
            }
        }

        document.getElementById('addUserForm').addEventListener('submit', async e => {
            e.preventDefault();
            clearModalError('addUserError');
            const groups = getPickerGroups('new-user');
            try {
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username:    document.getElementById('newUsername').value,
                        displayname: document.getElementById('newDisplayname').value,
                        email:       document.getElementById('newEmail').value,
                        password:    document.getElementById('newPassword').value,
                        groups
                    })
                });
                const message = await response.text();
                if (response.ok) {
                    displayMessage(message, 'success');
                    closeModal('addUserModal');
                    document.getElementById('addUserForm').reset();
                    await fetchAllGroups();
                    fetchUsers();
                } else {
                    showModalError('addUserError', message);
                }
            } catch (error) {
                showModalError('addUserError', `Failed to add user: ${error.message}`);
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async e => {
            e.preventDefault();
            clearModalError('changePasswordError');
            const username    = document.getElementById('changePasswordUsername').value;
            const newPassword = document.getElementById('changePassword').value;
            try {
                const response = await fetch(`/users/${username}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                const message = await response.text();
                if (response.ok) {
                    displayMessage(message, 'success');
                    closeModal('changePasswordModal');
                    document.getElementById('changePasswordForm').reset();
                } else {
                    showModalError('changePasswordError', message);
                }
            } catch (error) {
                showModalError('changePasswordError', `Failed to change password: ${error.message}`);
            }
        });

        let userToDelete = null;

        function deleteUser(username) {
            userToDelete = username;
            clearModalError('deleteUserError');
            document.getElementById('deleteUsername').textContent = username;
            document.getElementById('deleteUserModal').classList.add('active');
        }

        async function confirmDelete() {
            if (!userToDelete) return;
            const username = userToDelete;
            clearModalError('deleteUserError');
            try {
                const response = await fetch(`/users/${username}`, { method: 'DELETE' });
                const message  = await response.text();
                if (response.ok) {
                    closeModal('deleteUserModal');
                    displayMessage(message, 'success');
                    userToDelete = null;
                    fetchUsers();
                } else {
                    showModalError('deleteUserError', message);
                }
            } catch (error) {
                showModalError('deleteUserError', `Failed to delete user: ${error.message}`);
            }
        }

        window.addEventListener('click', e => {
            if (e.target.classList.contains('modal')) e.target.classList.remove('active');
        });

        fetchAllGroups().then(fetchUsers);
    </script>
</body>
</html>
