<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Published Services</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Service cards */
        .service-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }

        .service-header {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 0.6rem 1rem;
            cursor: pointer;
            user-select: none;
        }

        .service-header:hover { background: var(--bg-hover); }

        .service-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .service-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
        }

        .service-name .at-server {
            color: var(--text-muted);
            font-weight: 400;
        }

        .service-link {
            font-size: 0.78rem;
            color: var(--accent);
            font-family: var(--mono);
        }

        .service-link:hover { color: var(--accent-hover); }

        .service-actions {
            display: grid;
            grid-template-columns: auto 28px 16px;
            align-items: center;
            justify-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .service-chevron {
            font-size: 0.6rem;
            color: var(--text-dim);
            transition: transform 0.15s;
            display: inline-block;
        }

        .service-chevron.open { transform: rotate(180deg); }

        .service-body {
            display: none;
            padding: 0 1rem 1rem;
            border-top: 1px solid var(--border);
        }

        .service-body.open { display: block; }

        .service-details {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 0.4rem 0.75rem;
            align-items: center;
            margin-top: 0.75rem;
        }

        .service-details .detail-label {
            min-width: unset;
        }

        .service-details .detail-value {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .detail-edit-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 2px;
            cursor: pointer;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .detail-edit-icon:hover {
            color: var(--accent);
            background: var(--bg-hover);
        }

        .status-pending      { background: var(--yellow, #f59e0b); }

        /* Discoverable action buttons */
        .btn { transition: background-color 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s; }

        /* Discoverable section */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.5rem 0 0.6rem;
        }

        .section-title {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .discoverable-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.4rem;
        }

        .discoverable-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .discoverable-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }

        .discoverable-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--mono);
        }

        /* Publish progress */
        .progress-step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .step-icon { font-size: 0.85rem; width: 1.2rem; text-align: center; }

        /* Mobile */
        @media (max-width: 600px) {
            .service-header { grid-template-columns: 1fr; gap: 0.4rem; padding: 0.6rem 0.75rem; }
            .service-header-left { flex-wrap: wrap; }
            .service-actions { justify-content: start; }
            .service-body { padding: 0 0.75rem 0.75rem; }
            .service-details { grid-template-columns: 70px 1fr; gap: 0.3rem 0.5rem; }
            .discoverable-card { flex-direction: column; align-items: flex-start; }
            .section-header { margin: 1.25rem 0 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title">
            <!-- Server icon -->
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1.5" y="2" width="13" height="4.5" rx="1"/>
                <rect x="1.5" y="9.5" width="13" height="4.5" rx="1"/>
                <circle cx="4" cy="4.25" r="0.8" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="11.75" r="0.8" fill="currentColor" stroke="none"/>
            </svg>
            Published Services
        </div>
    </div>

    <div class="container">
        <div id="error-message"></div>
        <div id="services-container">
            <div class="loading">Loading services…</div>
        </div>

        <div id="processing-section" style="display:none">
            <div class="section-header">
                <span class="section-title">Processing</span>
            </div>
            <div id="processing-container"></div>
        </div>

        <div id="discoverable-section">
            <div class="section-header">
                <span class="section-title">Discoverable services</span>
                <div style="display:flex;gap:0.75rem;align-items:center">
                    <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.75rem;color:var(--text-muted);cursor:pointer;user-select:none" title="Toggle visibility of ignored services">
                        <input id="showIgnoredChk" type="checkbox" style="accent-color:var(--accent);cursor:pointer" onchange="toggleShowIgnored()">
                        Show ignored
                    </label>
                    <button class="btn btn-secondary btn-small" title="Re-scan for discoverable services" onclick="refreshPublishable()">Refresh</button>
                </div>
            </div>
            <div id="publishable-container"></div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Delete Service</div>
            <p style="font-size:0.85rem;color:var(--text-muted)">
                Remove <code style="color:var(--text);background:var(--bg-input);padding:0.1rem 0.3rem;border-radius:2px" id="deleteServiceName"></code>?
            </p>
            <p style="font-size:0.78rem;color:var(--red);margin-top:0.5rem;">Removes the reverse proxy route and DNS record.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="deleteCancelBtn" onclick="hideDeleteModal()">Cancel</button>
                <button class="btn btn-danger"    id="deleteConfirmBtn" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Redirect Modal -->
    <div id="redirectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Edit Root Redirect</div>
            <div>
                <span style="font-size:0.8rem;color:var(--text-muted)" id="redirectServiceLabel"></span>
                <div class="form-group" style="margin-top:0.6rem;">
                    <label class="form-label" for="redirectPath" title="If set, visiting the service root (/) will redirect to this path. Leave empty to remove.">Root path redirect</label>
                    <input type="text" id="redirectPath" class="form-input" placeholder="e.g. /dashboard/">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="redirectCancelBtn" onclick="hideRedirectModal()">Cancel</button>
                    <button class="btn btn-primary" id="redirectSubmitBtn" onclick="submitRedirect()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Publish Modal -->
    <div id="publishModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Publish Service</div>
            <div id="publishForm">
                <input type="hidden" id="publishAddress">
                <input type="hidden" id="publishPort">
                <div class="form-group" style="margin-bottom:0.5rem;">
                    <span style="color:var(--text-muted);font-size:0.8rem;" id="publishServiceLabel"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="publishSubdomain">Subdomain</label>
                    <input type="text" id="publishSubdomain" class="form-input" placeholder="e.g. pihole">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="publishRequiresAuth">
                    <label for="publishRequiresAuth">Require Authelia authentication</label>
                </div>
                <details id="publishAdvanced" style="margin-top:0.75rem;">
                    <summary style="cursor:pointer;font-size:0.8rem;color:var(--text-muted);user-select:none;">Advanced options</summary>
                    <div class="form-group" style="margin-top:0.6rem;">
                        <label class="form-label" for="publishRootRedirectPath" title="If set, visiting the service root (/) will redirect to this path">Root path redirect</label>
                        <input type="text" id="publishRootRedirectPath" class="form-input" placeholder="e.g. /dashboard">
                    </div>
                </details>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="publishCancelBtn" onclick="hidePublishModal()">Cancel</button>
                    <button class="btn btn-primary"   id="publishSubmitBtn" onclick="submitPublish()">Publish</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const expandedServices = new Set();

        function cardId(name) {
            return name.replace(/[^a-zA-Z0-9]/g, '_');
        }

        function toggleService(name) {
            const id = cardId(name);
            const body    = document.getElementById('body-' + id);
            const chevron = document.getElementById('chevron-' + id);
            if (!body) return;
            if (expandedServices.has(name)) {
                expandedServices.delete(name);
                body.classList.remove('open');
                chevron.classList.remove('open');
            } else {
                expandedServices.add(name);
                body.classList.add('open');
                chevron.classList.add('open');
            }
        }

        async function fetchServices() {
            try {
                const response = await fetch('/published-services/discover');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                displayServices(await response.json());
            } catch (error) {
                document.getElementById('error-message').innerHTML =
                    `<div class="error">Failed to load services: ${error.message}</div>`;
            }
        }

        async function fetchPublishable() {
            try {
                const response = await fetch('/published-services/publishable');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                displayPublishable(await response.json());
            } catch (error) {
                document.getElementById('publishable-container').innerHTML =
                    `<div class="error">Failed to load: ${error.message}</div>`;
            }
        }

        async function refreshPublishable() {
            document.getElementById('publishable-container').innerHTML = '<div class="loading">Loading…</div>';
            await fetchPublishable();
        }

        function getStatusHtml(state, isOk) {
            const cls = isOk ? 'status-ok' : 'status-error';
            return `<span class="status ${cls}"><span class="status-indicator"></span>${state}</span>`;
        }

        function displayServices(services) {
            const container = document.getElementById('services-container');
            if (services.length === 0) {
                container.innerHTML = '<div class="loading">No published services yet</div>';
                return;
            }

            const html = services.map(service => {
                const dnsOk  = service.dnsState === 'OK';
                const hostOk = service.state === 'OK';
                const id         = cardId(service.name);
                const isExpanded = expandedServices.has(service.name);
                const dotClass   = dnsOk && hostOk ? 'status-connected' : 'status-disconnected';
                const authBadge  = service.authenticated
                    ? '<span class="badge badge-success">auth</span>'
                    : '<span class="badge badge-warning">no-auth</span>';
                const serviceUrl = `https://${service.dnsAddress}`;
                const isSelf = service.dnsAddress.startsWith('vaier.');

                // Parse "subdomain @ server" display name
                const nameParts = service.name.split(' @ ');
                const displayName = nameParts.length === 2
                    ? `${nameParts[0]} <span class="at-server">@ ${nameParts[1]}</span>`
                    : service.name;

                return `
                <div class="service-card">
                    <div class="service-header" onclick="toggleService('${service.name.replace(/'/g, "\\'")}')">
                        <div class="service-header-left">
                            <span class="status-dot ${dotClass}"></span>
                            <span class="service-name">${displayName}</span>
                            ${dnsOk && !isSelf
                                ? `<a class="service-link" href="${serviceUrl}" target="${service.dnsAddress}" onclick="event.stopPropagation()">${service.dnsAddress}</a>`
                                : `<span style="font-size:0.75rem;color:var(--text-dim);font-family:var(--mono)">${service.dnsAddress}</span>`}
                        </div>
                        <div class="service-actions">
                            ${authBadge}
                            ${service.mandatory ? '<span></span>' : `
                            <button class="btn btn-small btn-danger" onclick="event.stopPropagation();showDeleteModal('${service.dnsAddress}')">
                                <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="3 3 13 13"/><polyline points="13 3 3 13"/></svg>
                            </button>`}
                            <span class="service-chevron ${isExpanded ? 'open' : ''}" id="chevron-${id}">▼</span>
                        </div>
                    </div>
                    <div class="service-body ${isExpanded ? 'open' : ''}" id="body-${id}">
                        <div class="service-details">
                            <span class="detail-label">DNS</span>
                            <span class="detail-value">${getStatusHtml(service.dnsState, dnsOk)}</span>

                            <span class="detail-label">Host</span>
                            <span class="detail-value">${service.hostAddress}:${service.hostPort} ${getStatusHtml(service.state, hostOk)}</span>

                            <span class="detail-label">Auth</span>
                            <span class="detail-value">${authBadge}${service.mandatory ? '' : `
                                <span class="detail-edit-icon" title="${service.authenticated ? 'Disable' : 'Enable'} authentication"
                                    onclick="toggleAuth(this, '${service.dnsAddress}', ${service.authenticated})">
                                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3z"/></svg>
                                </span>`}</span>

                            <span class="detail-label">Redirect</span>
                            <span class="detail-value">${service.rootRedirectPath || 'none'}${service.mandatory ? '' : `
                                <span class="detail-edit-icon" title="Edit root redirect"
                                    onclick="showRedirectModal('${service.dnsAddress}', '${(service.rootRedirectPath || '').replace(/'/g, "\\'")}')">
                                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3z"/></svg>
                                </span>`}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
        }

        let showIgnored = false;
        let lastPublishableServices = [];

        function ignoreKey(s) {
            return s.source === 'PEER'
                ? s.peerName + '/' + s.containerName + ':' + s.port
                : s.containerName + ':' + s.port;
        }

        function toggleShowIgnored() {
            showIgnored = document.getElementById('showIgnoredChk').checked;
            displayPublishable(lastPublishableServices);
        }

        function displayPublishable(services) {
            lastPublishableServices = services;
            const container = document.getElementById('publishable-container');
            const section = document.getElementById('discoverable-section');
            const visible = showIgnored ? services : services.filter(s => !s.ignored);
            if (visible.length === 0) {
                container.innerHTML = '<div class="loading">No discoverable services</div>';
                return;
            }

            const html = visible.map(s => {
                const isLocal = s.source === 'LOCAL';
                const meta = isLocal
                    ? `this server · ${s.address}:${s.port}`
                    : `${s.peerName} · ${s.address}:${s.port}`;
                const sourceBadge = isLocal
                    ? '<span class="badge badge-warning">local</span>'
                    : `<span class="badge badge-success">${s.peerName}</span>`;
                const key = ignoreKey(s);
                const nameStyle = s.ignored ? 'opacity:0.45' : '';
                const actionButtons = s.ignored
                    ? `<button class="btn btn-success btn-small" title="Show this service again in the list" onclick="unignoreService('${key}')">Unignore</button>`
                    : `<button class="btn btn-primary btn-small"
                        title="Publish ${s.containerName} as a reverse-proxy route"
                        data-address="${s.address}"
                        data-port="${s.port}"
                        data-container="${s.containerName}"
                        data-source="${isLocal ? 'this server' : s.peerName}"
                        data-redirect="${s.rootRedirectPath || ''}"
                        onclick="showPublishModalFromBtn(this)">
                        + Publish
                    </button>
                    <button class="btn btn-warning btn-small" title="Hide this service from the list" onclick="ignoreService('${key}')">Ignore</button>`;
                return `
                <div class="discoverable-card">
                    <div class="discoverable-info" style="${nameStyle}">
                        ${sourceBadge}
                        <span class="discoverable-name">${s.containerName}</span>
                        <span class="discoverable-meta">${meta}</span>
                    </div>
                    <div style="display:flex;gap:0.4rem;align-items:center">
                        ${actionButtons}
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
        }

        async function ignoreService(key) {
            await fetch('/published-services/publishable/ignore', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            await fetchPublishable();
        }

        async function unignoreService(key) {
            await fetch('/published-services/publishable/unignore', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            await fetchPublishable();
        }

        function showPublishModalFromBtn(btn) {
            showPublishModal(btn.dataset.address, parseInt(btn.dataset.port), btn.dataset.container, btn.dataset.source, btn.dataset.redirect || null);
        }

        function showPublishModal(address, port, containerName, sourceName, rootRedirectPath) {
            document.getElementById('publishAddress').value          = address;
            document.getElementById('publishPort').value             = port;
            document.getElementById('publishRootRedirectPath').value = rootRedirectPath || '';
            document.getElementById('publishSubdomain').value        = sourceName === 'this server' ? containerName : `${containerName}.${sourceName}`;
            document.getElementById('publishServiceLabel').textContent =
                `${containerName} on ${sourceName} (${address}:${port})`;
            document.getElementById('publishRequiresAuth').checked = false;
            document.getElementById('publishAdvanced').open = !!rootRedirectPath;
            document.getElementById('publishModal').classList.add('active');
            document.getElementById('publishSubdomain').focus();
        }

        function hidePublishModal() {
            document.getElementById('publishModal').classList.remove('active');
        }

        function addProcessingCard(subdomain, requiresAuth, dnsPropagated) {
            const id = cardId(subdomain);
            if (document.getElementById('proc-' + id)) return; // already exists
            const authBadge = requiresAuth
                ? '<span class="badge badge-success">auth</span>'
                : '<span class="badge badge-warning">no-auth</span>';
            const step2opacity = dnsPropagated ? '1' : '0.35';
            const step2icon    = dnsPropagated ? '✓' : '⏳';
            const card = document.createElement('div');
            card.id = 'proc-' + id;
            card.className = 'service-card';
            card.innerHTML = `
                <div class="service-header" style="cursor:default">
                    <div class="service-header-left">
                        <span class="status-dot status-pending"></span>
                        <span class="service-name">${subdomain}</span>
                    </div>
                    <div class="service-actions">${authBadge}</div>
                </div>
                <div style="padding:0.5rem 1rem 0.75rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:0.35rem">
                    <div id="proc-step-dns-create-${id}"    class="progress-step"><span class="step-icon">✓</span><span>DNS record created</span></div>
                    <div id="proc-step-dns-propagate-${id}" class="progress-step" style="opacity:${step2opacity}"><span class="step-icon">${step2icon}</span><span>Waiting for DNS propagation…</span></div>
                    <div id="proc-step-traefik-${id}"       class="progress-step" style="opacity:0.35"><span class="step-icon">⏳</span><span>Activating reverse proxy route…</span></div>
                </div>`;
            document.getElementById('processing-container').appendChild(card);
            document.getElementById('processing-section').style.display = '';
        }

        function removeProcessingCard(subdomain) {
            const el = document.getElementById('proc-' + cardId(subdomain));
            if (el) el.remove();
            const container = document.getElementById('processing-container');
            if (container.children.length === 0)
                document.getElementById('processing-section').style.display = 'none';
        }

        function setProcessingStep(subdomain, stepId, done) {
            const el = document.getElementById('proc-step-' + stepId + '-' + cardId(subdomain));
            if (!el) return;
            el.style.opacity = '1';
            el.querySelector('.step-icon').textContent = done ? '✓' : '⏳';
        }

        async function fetchPending() {
            try {
                const response = await fetch('/published-services/pending');
                if (!response.ok) return;
                (await response.json()).forEach(p => {
                    addProcessingCard(p.subdomain, p.requiresAuth, p.dnsPropagated);
                    if (p.dnsPropagated) setProcessingStep(p.subdomain, 'dns-propagate', true);
                });
            } catch (e) { /* ignore */ }
        }

        async function submitPublish() {
            const address          = document.getElementById('publishAddress').value;
            const port             = parseInt(document.getElementById('publishPort').value);
            const rootRedirectPath = document.getElementById('publishRootRedirectPath').value || null;
            const subdomain        = document.getElementById('publishSubdomain').value.trim();
            const requiresAuth     = document.getElementById('publishRequiresAuth').checked;

            if (!subdomain) { alert('Please enter a subdomain'); return; }

            const id = cardId(subdomain);
            if (document.getElementById('proc-' + id) || document.getElementById('body-' + id)) {
                alert(`"${subdomain}" is already active or being added.`);
                return;
            }

            const submitBtn = document.getElementById('publishSubmitBtn');
            const cancelBtn = document.getElementById('publishCancelBtn');
            submitBtn.disabled = true;
            cancelBtn.disabled = true;
            submitBtn.textContent = 'Publishing…';

            try {
                const response = await fetch('/published-services/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, port, subdomain, requiresAuth, rootRedirectPath })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                hidePublishModal();
                addProcessingCard(subdomain, requiresAuth, false);
                fetchPublishable();

            } catch (error) {
                alert(`Failed to publish service: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                cancelBtn.disabled = false;
                submitBtn.textContent = 'Publish';
            }
        }

        async function toggleAuth(btn, dnsAddress, currentlyAuthenticated) {
            const newAuth = !currentlyAuthenticated;
            try {
                const response = await fetch(`/published-services/${encodeURIComponent(dnsAddress)}/auth`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requiresAuth: newAuth })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                await fetchServices();
            } catch (error) {
                alert(`Failed to update authentication: ${error.message}`);
            }
        }

        function showDeleteModal(dnsAddress) {
            document.getElementById('deleteServiceName').textContent = dnsAddress;
            document.getElementById('deleteConfirmBtn').dataset.dns  = dnsAddress;
            document.getElementById('deleteModal').classList.add('active');
        }

        function hideDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        async function confirmDelete() {
            const dnsAddress = document.getElementById('deleteConfirmBtn').dataset.dns;
            if (!dnsAddress) return;
            const deleteBtn = document.getElementById('deleteConfirmBtn');
            const cancelBtn = document.getElementById('deleteCancelBtn');
            deleteBtn.disabled = true;
            cancelBtn.disabled = true;
            deleteBtn.textContent = 'Deleting…';
            try {
                const response = await fetch(`/published-services/${encodeURIComponent(dnsAddress)}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                hideDeleteModal();
                await Promise.all([fetchServices(), fetchPublishable()]);
            } catch (error) {
                alert(`Failed to delete service: ${error.message}`);
            } finally {
                deleteBtn.disabled = false;
                cancelBtn.disabled = false;
                deleteBtn.textContent = 'Delete';
            }
        }

        function showRedirectModal(dnsAddress, currentPath) {
            document.getElementById('redirectServiceLabel').textContent = dnsAddress;
            document.getElementById('redirectPath').value = currentPath || '';
            document.getElementById('redirectSubmitBtn').dataset.dns = dnsAddress;
            document.getElementById('redirectModal').classList.add('active');
            document.getElementById('redirectPath').focus();
        }

        function hideRedirectModal() {
            document.getElementById('redirectModal').classList.remove('active');
        }

        async function submitRedirect() {
            const dnsAddress = document.getElementById('redirectSubmitBtn').dataset.dns;
            const path = document.getElementById('redirectPath').value.trim() || null;
            const submitBtn = document.getElementById('redirectSubmitBtn');
            const cancelBtn = document.getElementById('redirectCancelBtn');
            submitBtn.disabled = true;
            cancelBtn.disabled = true;
            submitBtn.textContent = 'Saving…';
            try {
                const response = await fetch(`/published-services/${encodeURIComponent(dnsAddress)}/redirect`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rootRedirectPath: path })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                hideRedirectModal();
                await fetchServices();
            } catch (error) {
                alert(`Failed to update redirect: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                cancelBtn.disabled = false;
                submitBtn.textContent = 'Save';
            }
        }

        window.onclick = e => {
            if (e.target.classList.contains('modal')) e.target.classList.remove('active');
        };

        fetchServices();
        fetchPublishable();
        fetchPending();
        setInterval(fetchServices, 30000);

        const _sse = new EventSource('/published-services/events');

        _sse.addEventListener('publish-dns-propagated', e => {
            setProcessingStep(e.data, 'dns-propagate', true);
            setProcessingStep(e.data, 'traefik', false);  // reveal step 3
        });

        _sse.addEventListener('publish-traefik-active', e => {
            setProcessingStep(e.data, 'traefik', true);
            setTimeout(() => {
                removeProcessingCard(e.data);
                Promise.all([fetchServices(), fetchPublishable()]);
            }, 800);
        });

        _sse.addEventListener('publish-dns-timeout', e => {
            removeProcessingCard(e.data);
            alert(`DNS propagation timed out for "${e.data}". The DNS record was created but did not become visible on authoritative nameservers in time. Try publishing again — if it keeps failing, check your Route53 zone.`);
            Promise.all([fetchServices(), fetchPublishable()]);
        });

        _sse.addEventListener('service-updated', () => {
            fetchServices();
        });

        let _sseConnected = false;
        _sse.onopen = () => {
            if (_sseConnected) { fetchServices(); fetchPublishable(); fetchPending(); }
            _sseConnected = true;
        };

        _sse.onerror = () => {
            // browser auto-reconnects; re-fetch on reconnection to catch up
            fetchServices();
            fetchPublishable();
        };
    </script>
</body>
</html>
