<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Awaiting approval · Vaier</title>
  <style>
    :root{
      --bg:#1e1e1e; --bg-card:#252526; --border:#3c3c3c;
      --text:#d4d4d4; --text-muted:#858585; --text-dim:#5a5a5a;
      --accent:#4fc3f7; --accent-hover:#81d4fa; --yellow:#dcdcaa;
      --mono:'SF Mono','Cascadia Code',Consolas,'Courier New',monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); color:var(--text); padding:1.5rem;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .card{
      width:100%; max-width:380px; background:var(--bg-card); border:1px solid var(--border);
      border-radius:10px; padding:2.6rem 2rem 2rem; text-align:center;
      box-shadow:0 14px 44px rgba(0,0,0,.45);
    }
    .logo{width:52px; height:52px; margin:0 auto 1rem; display:block;
      filter:drop-shadow(0 0 11px rgba(79,195,247,.4));}
    .badge{display:inline-block; font-family:var(--mono); font-size:.7rem; letter-spacing:.08em;
      text-transform:uppercase; color:var(--yellow); border:1px solid #6b5a2a; border-radius:999px;
      padding:.2rem .6rem; margin-bottom:.9rem;}
    .title{font-size:1.15rem; font-weight:600; margin:0 0 .55rem; color:var(--text);}
    .msg{color:var(--text-muted); font-size:.86rem; line-height:1.5; margin:0 0 1.7rem;}
    .signout{display:inline-block; color:var(--accent); font-size:.82rem; text-decoration:none;
      border-bottom:1px solid transparent; transition:border-color .15s;}
    .signout:hover{border-color:var(--accent);}
    .signout:focus-visible{outline:2px solid var(--accent-hover); outline-offset:3px;}
    .foot{margin-top:1.7rem; color:var(--text-dim); font-size:.72rem;}
  </style>
</head>
<body>
  <main class="card">
    <svg class="logo" viewBox="0 0 16 16" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
      <circle cx="8" cy="8" r="2.2" fill="var(--accent)" stroke="none"/>
      <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
      <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
      <circle cx="2.5" cy="3.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="13.5" cy="3.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="2.5" cy="12.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="13.5" cy="12.5" r="1.5" fill="var(--accent)" stroke="none"/>
    </svg>
    <span class="badge">Awaiting approval</span>
    <h1 class="title">You're signed in, but not approved yet</h1>
    <p class="msg">Your account has been recorded. An administrator needs to grant you access before you can continue. You'll be able to sign in once they do.</p>
    <a class="signout" href="/oauth2/sign_out">Sign in with a different account</a>
    <p class="foot">Protected by Vaier</p>
  </main>
</body>
</html>
