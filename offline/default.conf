# Serve the single branded offline page for ANY path/method, so the fallback router can stand in
# for Vaier on any URL the operator hits while Vaier is down. The page is returned with a 503
# ("temporarily unavailable") status — honest for a down control panel, and tells clients to retry.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    error_page 503 /index.html;

    location / {
        return 503;
    }

    # Allow the error_page handler to read the static file (not reachable directly).
    location = /index.html {
        internal;
    }
}
