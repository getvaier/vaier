<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Vaier</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 fill=%22none%22 stroke=%22%234fc3f7%22 stroke-width=%221.5%22 stroke-linecap=%22round%22><circle cx=%228%22 cy=%228%22 r=%222.2%22 fill=%22%234fc3f7%22 stroke=%22none%22/><line x1=%222.5%22 y1=%223.5%22 x2=%226%22 y2=%226.5%22/><line x1=%2213.5%22 y1=%223.5%22 x2=%2210%22 y2=%226.5%22/><line x1=%222.5%22 y1=%2212.5%22 x2=%226%22 y2=%229.5%22/><line x1=%2213.5%22 y1=%2212.5%22 x2=%2210%22 y2=%229.5%22/><circle cx=%222.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%223.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%222.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/><circle cx=%2213.5%22 cy=%2212.5%22 r=%221.5%22 fill=%22%234fc3f7%22 stroke=%22none%22/></svg>">
  <style>
    :root{
      --bg:#1e1e1e; --bg-card:#252526; --border:#3c3c3c;
      --text:#d4d4d4; --text-muted:#858585; --text-dim:#5a5a5a;
      --accent:#4fc3f7; --accent-hover:#81d4fa;
      --mono:'SF Mono','Cascadia Code',Consolas,'Courier New',monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); color:var(--text); padding:1.5rem;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .card{
      width:100%; max-width:360px; background:var(--bg-card); border:1px solid var(--border);
      border-radius:10px; padding:2.6rem 2rem 2rem; text-align:center;
      box-shadow:0 14px 44px rgba(0,0,0,.45);
    }
    .logo{width:54px; height:54px; margin:0 auto .9rem; display:block;
      filter:drop-shadow(0 0 11px rgba(79,195,247,.4));}
    .brand{font-family:var(--mono); font-size:1.4rem; font-weight:600; letter-spacing:.06em;
      margin:0 0 .2rem; color:var(--text);}
    .sub{color:var(--text-muted); font-size:.85rem; line-height:1.4; margin:0 0 1.9rem;}
    .providers{display:flex; flex-direction:column; gap:.6rem;}
    .btn{
      display:flex; align-items:center; justify-content:center; gap:.55rem; width:100%;
      padding:.72rem 1rem; border:1px solid var(--accent); border-radius:6px; background:var(--accent);
      color:#06222e; font-size:.95rem; font-weight:600; cursor:pointer;
      text-decoration:none; transition:background .15s ease, color .15s ease, border-color .15s ease;
    }
    .btn:hover{background:var(--accent-hover); border-color:var(--accent-hover);}
    .btn:focus-visible{outline:2px solid var(--accent-hover); outline-offset:2px;}
    /* GitHub: quieter sibling — outlined until hover, so Google stays the primary affordance. */
    .btn-secondary{background:transparent; color:var(--accent);}
    .btn-secondary:hover{background:var(--accent); color:#06222e; border-color:var(--accent);}
    .btn .glyph{width:1.05rem; height:1.05rem; flex:none;}
    .foot{margin-top:1.7rem; color:var(--text-dim); font-size:.72rem; letter-spacing:.02em;}
    @media (prefers-reduced-motion:reduce){.btn{transition:none}}
  </style>
</head>
<body>
  <main class="card">
    <svg class="logo" viewBox="0 0 16 16" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
      <circle cx="8" cy="8" r="2.2" fill="var(--accent)" stroke="none"/>
      <line x1="2.5" y1="3.5" x2="6" y2="6.5"/><line x1="13.5" y1="3.5" x2="10" y2="6.5"/>
      <line x1="2.5" y1="12.5" x2="6" y2="9.5"/><line x1="13.5" y1="12.5" x2="10" y2="9.5"/>
      <circle cx="2.5" cy="3.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="13.5" cy="3.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="2.5" cy="12.5" r="1.5" fill="var(--accent)" stroke="none"/>
      <circle cx="13.5" cy="12.5" r="1.5" fill="var(--accent)" stroke="none"/>
    </svg>
    <h1 class="brand">Vaier</h1>
    <p class="sub">{{if .SignInMessage}}{{.SignInMessage}}{{else}}Sign in to continue{{end}}</p>
    <form method="GET" action="{{.ProxyPrefix}}/start" class="providers">
      <input type="hidden" name="rd" value="{{.Redirect}}">
      <button type="submit" class="btn" name="connector_id" value="google">
        <svg class="glyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 11v2.8h4.5c-.2 1.2-1.4 3.5-4.5 3.5-2.7 0-4.9-2.2-4.9-5s2.2-5 4.9-5c1.5 0 2.6.7 3.2 1.2l2.2-2.1C15.9 4.9 14.1 4 12 4 7.6 4 4 7.6 4 12s3.6 8 8 8c4.6 0 7.7-3.2 7.7-7.8 0-.5 0-.9-.1-1.2H12z"/>
        </svg>
        Continue with Google
      </button>
      <button type="submit" class="btn btn-secondary" name="connector_id" value="github">
        <svg class="glyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.87-.01-1.71-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05a9.36 9.36 0 0 1 2.5-.34c.85 0 1.71.12 2.5.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>
        </svg>
        Continue with GitHub
      </button>
    </form>
    <p class="foot">Protected by Vaier</p>
  </main>
</body>
</html>
